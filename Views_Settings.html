  renderSidebar: function() {

      ]}
    ];

    sidebar.innerHTML = menu.map(m => `
      <div class="category-group">
         <button class="v-tab-btn-settings ${this.activeCategory === m.id ? 'active' : ''}" onclick="SettingsView.setCategory('${m.id}')">

  render: async function() {
    const stage = document.getElementById('main-stage');
    stage.innerHTML = `
      <div class="bg-dark text-white px-5 py-4 d-flex justify-content-between align-items-center sticky-top shadow">

         </div>
      </div>`;

    await this.load();
  },

  load: async function() {
    const [resS, resCC, resAuto] = await Promise.all([
      HandooApp.api('admin.get_settings'),
      HandooApp.api('admin.get_cost_centers'),
      HandooApp.api('subscription.get_auto_status')
    ]);

    if(resS.ok) this.data = resS.data; 
    if(resCC.ok) this.costCenters = resCC.data || [];
    if(resAuto.ok) this.autoBilling = resAuto.data;
    
    if(this.subCategory === 'audit_logs') {
       const resLogs = await HandooApp.api('admin.get_audit_logs');
       if(resLogs.ok) this.auditLogs = resLogs.data || [];
    }

    this.renderContent(); 
  },

  setCategory: function(cat) { 
    this.activeCategory = cat; 
    this.editingMaster = null; 
    const map = { nucleus:'global', accounting:'pgc_list', treasury:'banks', security:'profile' };
    this.subCategory = map[cat];
    this.renderSidebar();
    
    // 🚀 NAVEGACIÓN INSTANTÁNEA EN MEMORIA
    this.renderContent(); 
  },

  setSubCategory: async function(sub) { 
    this.subCategory = sub; 
    this.editingMaster = null; 
    this.renderSidebar();
    
    if (sub === 'audit_logs' && (!this.auditLogs || this.auditLogs.length === 0)) {
       const content = document.getElementById('settings-content');
       if(content) content.innerHTML = '<div class="text-center p-5"><div class="spinner-border text-brand"></div><p class="small fw-bold text-muted mt-3">Recuperando registros de seguridad...</p></div>';
       const resLogs = await HandooApp.api('admin.get_audit_logs');
       if(resLogs.ok) this.auditLogs = resLogs.data || [];
    }

    if (sub === 'operations') {
       const content = document.getElementById('settings-content');
       if(content) content.innerHTML = '<div class="text-center p-5"><div class="spinner-border text-brand"></div><p class="small fw-bold text-muted mt-3">Conectando con túnel de operativa...</p></div>';
       const resOp = await new Promise(r => google.script.run.withSuccessHandler(r).withFailureHandler(()=>r(null)).TITANIUM_get_shift_types());
       this.globalShifts = (resOp && resOp.ok && resOp.data) ? resOp.data : [
           {name: '☀️ TURNO DE MAÑANA', start: '08:00', end: '16:00'},
           {name: '🌤️ TURNO DE TARDE', start: '16:00', end: '23:59'}
       ];
    }
    
    this.renderContent(); 
  },

  renderContent: function() {

    if (this.editingMaster) { content.innerHTML = this.renderMasterForm(); return; }

           </div>
           <div class="card-industrial border-0 overflow-hidden shadow-sm">

                          <td class="ps-4 font-monospace small text-muted">${new Date(l.timestamp).toLocaleString()}</td>
                          <td><span class="badge bg-dark fw-black" style="font-size:9px">${l.user}</span></td>
                          <td class="fw-bold small text-uppercase">${l.action}</td>
                          <td class="small text-muted pe-4">${escapeHTML(l.details)}</td>
                       </tr>`).join('') || '<tr><td colspan="4" class="p-5 text-center opacity-25">SIN EVENTOS REGISTRADOS</td></tr>'}
                 </tbody>
              </table>
           </div>
        </div>`;
       return;
    }

    if (this.subCategory === 'cost_centers') {
       content.innerHTML = `

  renderAccountingContent: function() {
    const m = this.data.masters || {};
    const bals = this.data.balances || {};
    const clients = this.data.clients || [];
    const vendors = m.vendors || [];
    const banks = m.bank_accounts || [];
    const aliases = m.pgc_aliases || [];

    if(this.subCategory === 'pgc_list') {
       const allAccounts = new Set();
       clients.forEach(c => { if(c.cuenta_contable) allAccounts.add(c.cuenta_contable); });
       banks.forEach(b => { if(b.ref_contable) allAccounts.add(b.ref_contable); });
       Object.keys(bals).forEach(acc => allAccounts.add(acc));
       aliases.forEach(a => { if(a.ref_contable) allAccounts.add(a.ref_contable); });

       const sortedAccounts = Array.from(allAccounts).sort();

       return `
       <div class="animate-slide">
          <div class="d-flex justify-content-between align-items-center mb-4">
             <div><h6 class="h-label m-0">DIARIO DE SUMAS Y SALDOS</h6><p class="small text-muted m-0">Estado vivo del PGC.</p></div>
             <div class="badge bg-dark px-3 py-2 fw-black" style="font-size:10px">${sortedAccounts.length} CUENTAS REGISTRADAS</div>
          </div>
          <div class="card-industrial border-0 overflow-hidden shadow-sm">
             <table class="table-pgc-industrial">
                <thead>
                   <tr><th style="width:180px">CUENTA</th><th>TITULAR / REFERENCIA AUXILIAR</th><th class="text-end" style="width:150px">SALDO (€)</th></tr>
                </thead>
                <tbody>
                   ${sortedAccounts.map(acc => {
                     let name = 'Auxiliar Técnico / Cuenta Interna';
                     const val = parseFloat(bals[acc] || 0);
                     const custom = aliases.find(a => a.ref_contable === acc);
                     if(custom) name = custom.nombre;
                     else if(acc.startsWith('430') || acc.startsWith('431')) {
                       const c = clients.find(cl => cl.cuenta_contable === acc || cl.cuenta_contable?.replace('430','431') === acc || cl.cuenta_contable?.replace('430','4315') === acc);
                       if(c) name = c.nombre_fiscal;
                     } else if(acc.startsWith('572')) {
                       const b = banks.find(ba => ba.ref_contable === acc);
                       if(b) name = b.nombre;
                     }
                     return `
                     <tr onclick="SettingsView.openAccountOptions('${acc}', '${escapeHTML(name)}')">
                        <td class="cell-acc-id">${acc}</td>
                        <td class="cell-acc-name">${name}</td>
                        <td class="cell-acc-val ${val < 0 ? 'text-danger' : (val > 0 ? 'text-success' : 'text-muted')}">
                           ${val.toLocaleString('es-ES', {minimumFractionDigits:2, maximumFractionDigits:2})} €
                        </td>
                     </tr>`;
                   }).join('')}
                </tbody>
             </table>
          </div>
       </div>`;
    }
    
    const list = this.subCategory === 'taxes' ? m.taxes : m.retentions;
    const type = this.subCategory === 'taxes' ? 'TAX' : 'RETENTION';
    return this.renderMasterList(type, list);
  },

  executeTransfer: async function(acc) {
    const dest = document.getElementById('transfer-dest').value;
    const amount = parseFloat(document.getElementById('transfer-amount').value);
    if(!dest || !amount) return;
    
    if(await HandooApp.ui.confirm("¿CONFIRMAR AJUSTE PGC?", "Se crearán dos movimientos de compensación manual.")) {
       const res = await HandooApp.api('admin.save_movement', { cuenta: acc, cuenta_destino: dest, importe: amount, concepto: 'Traspaso de saldo PGC' });
       if(res.ok) {
          document.querySelector('.h-modal-overlay').remove();
          this.load();
          HandooApp.ui.showToast("Ajuste contable sincronizado");
       }
    }
  },

  executeRename: async function(acc) {
    const newName = document.getElementById('edit-acc-name').value;
    if(!newName) return;
    HandooApp.ui.setLoading('btn-save-acc-name', true);
    const res = await HandooApp.api('platform.get_clients');
    const clients = res.data || [];
    const c = clients.find(cl => cl.cuenta_contable === acc || cl.cuenta_contable?.replace('430','431') === acc || cl.cuenta_contable?.replace('430','4315') === acc);
    if(c) {
       c.nombre_fiscal = newName.toUpperCase();
       await HandooApp.api('platform.save_client', c);
    } else {
       const mRes = await HandooApp.api('admin.get_settings');
       const banks = mRes.data?.masters?.bank_accounts || [];
       const b = banks.find(ba => ba.ref_contable === acc);
       if(b) {
          b.nombre = newName.toUpperCase();
          await HandooApp.api('masters.save', { master: b });
       } else {
          await HandooApp.api('masters.save', { master: { type: 'PGC_ALIAS', id: 'PGC-' + acc, ref_contable: acc, nombre: newName.toUpperCase() } });
       }
    }
    HandooApp.ui.setLoading('btn-save-acc-name', false);
    document.querySelector('.h-modal-overlay').remove();
    await this.load();
    HandooApp.ui.showToast("Sincronizado");
  },

  openMovementsAuditor: async function(acc, name) {
    HandooApp.ui.showToast("Cargando diario...", "info");

    const docs = [];
    if(acc.startsWith('430')) {
       const clients = resMov.data?.clients || [];
       const c = clients.find(cl => cl.cuenta_contable === acc);
       if(c) {
          (resInv.data || []).filter(i => i.client_id === c.id).forEach(i => docs.push({ id: i.id, fecha: i.fecha, concepto: `Factura ${i.numero}`, importe: i.total, type: 'INVOICE' }));
          (resEff.data || []).filter(e => e.client_id === c.id && e.status === 'COBRADO').forEach(e => docs.push({ id: e.id, fecha: e.vencimiento, concepto: `Cobro Efecto ${e.id}`, importe: e.importe * -1, type: 'EFFECT' }));
       }
    }
    const overlay = document.createElement('div');
    overlay.className = 'h-modal-overlay animate-slide';
    overlay.style.zIndex = '11000';
    overlay.innerHTML = `
      <div class="h-modal shadow-lg" style="width: 800px">
         <div class="h-modal-header"><h5 class="m-0 fw-black text-uppercase">AUDITORÍA: ${acc}</h5><span class="badge bg-white text-dark fw-black">${name}</span></div>
         <div class="h-modal-body bg-light">
            <div class="card-industrial border-0 overflow-hidden shadow-sm">
               <table class="table table-hover m-0 align-middle table-audit" style="font-size:11px">
                  <thead class="bg-light"><tr><th class="ps-3 py-2">FECHA</th><th>CONCEPTO / DOCUMENTO</th><th class="text-end pe-3">IMPORTE</th></tr></thead>
                  <tbody>${docs.map(d => `<tr onclick="SettingsView.showDocumentFicha('${d.id}', '${d.type}')" title="Ver Ficha de Detalle"><td class="ps-3">${new Date(d.fecha).toLocaleDateString()}</td><td class="fw-bold"><i class="bi bi-file-earmark-text text-brand me-2"></i> ${d.concepto}</td><td class="text-end pe-3 fw-black ${d.importe<0?'text-danger':'text-success'}">${parseFloat(d.importe).toLocaleString()} €</td></tr>`).join('') || '<tr><td colspan="3" class="p-5 text-center opacity-25">SIN REGISTROS LOCALIZADOS</td></tr>'}</tbody>
               </table>
            </div>
         </div>
         <div class="h-modal-footer"><button class="btn btn-dark w-100 fw-black" onclick="this.closest('.h-modal-overlay').remove()">CERRAR</button></div>
      </div>`;
    document.body.appendChild(overlay);
  },

  saveOperations: function() {
      const btn = document.getElementById('btn-save-op');
      if(!btn) return;
      
      // 1. Bloqueo y animación visual nativa
      HandooApp.ui.setLoading('btn-save-op', true, "GUARDANDO...");
      
      const shiftRows = document.querySelectorAll('.shift-config-row');
      const shifts = Array.from(shiftRows).map(row => ({
          name: row.querySelector('.shift-name').value.trim().toUpperCase(),
          start: row.querySelector('.shift-start').value,
          end: row.querySelector('.shift-end').value
      })).filter(s => s.name !== '');

      // 2. Envío por el túnel paralelo TITANIUM
      google.script.run.withSuccessHandler(res => {
          HandooApp.ui.setLoading('btn-save-op', false); // Apagamos animación
          if(res && res.ok) {
              HandooApp.ui.showToast(res.msg, "success");
              SettingsView.globalShifts = shifts; // Actualizamos memoria local
          } else {
              HandooApp.ui.showToast("Fallo al guardar: " + res.msg, "error");
          }
      }).withFailureHandler(err => {
          HandooApp.ui.setLoading('btn-save-op', false); // Apagamos animación
          HandooApp.ui.showToast(err.message, "error");
      }).TITANIUM_save_shift_types(shifts);
  },

  executeAutopilotScan: async function() {
     HandooApp.ui.showToast("Iniciando escaneo autónomo del Kernel...", "info");
     const res = await HandooApp.api('autopilot.execute_scan');
     if(res.ok) {
        HandooApp.ui.showToast(res.msg, "success");
        HandooApp.ui.logToDrawer(res.msg, "success");
     } else {
        HandooApp.ui.showToast(res.msg, "error");
     }
  },

  executeGInboundScan: async function() {
     HandooApp.ui.showToast("Conectando con Gmail API...", "info");
     const res = await HandooApp.api('autopilot.scan_mail');
     if(res.ok) {
        HandooApp.ui.showToast(res.msg, "success");

  savePIN: async function() {
    const pinNew = document.getElementById('set-pin-new').value;
    const pinConf = document.getElementById('set-pin-confirm').value;

    if(!pinNew || !pinConf) return HandooApp.ui.showToast("Complete los campos del PIN", "error");
    if(pinNew !== pinConf) return HandooApp.ui.showToast("Los PIN no coinciden", "error");
    if(pinNew.length !== 4) return HandooApp.ui.showToast("El PIN debe tener 4 dígitos", "error");

    HandooApp.ui.setLoading('btn-save-pin', true);
    const res = await HandooApp.api('admin.save_settings', { admin_pin: pinNew });
    HandooApp.ui.setLoading('btn-save-pin', false);
    
    if(res.ok) {
       HandooApp.ui.showToast("PIN de seguridad actualizado.");
       document.getElementById('set-pin-old').value = '';
       document.getElementById('set-pin-new').value = '';
       document.getElementById('set-pin-confirm').value = '';
    } else {
       HandooApp.ui.showToast(res.msg, "error");
    }
  },

    if (type === 'SERIES') schema = { id: 'new', type: 'SERIES', nombre: '', prefijo: '', inicio: 1, tipo_serie: 'VENTA', pgc_root: '700' };

    if (type === 'PLAN') schema = { id: 'new', type: 'PLAN', nombre: '', descripcion: '', pvp: 0, active_modules: [] };
    if (type === 'MODULE') schema = { id: 'new', type: 'MODULE', nombre: '', descripcion: '', pvp: 0, active_modules: [] };

    if (id !== 'new') {
      const keys = { 'TAX': 'taxes', 'RETENTION': 'retentions', 'COMPANY': 'companies', 'SERIES': 'series', 'BANK_ACCOUNT': 'bank_accounts', 'PAYMENT_METHOD': 'payment_methods', 'PERIODICITY': 'periodicities', 'PAYMENT_TERM': 'payment_terms', 'PLAN': 'plans', 'MODULE': 'modules' };

  handleIBANInput: function(val) {
    let clean = val.replace(/\s/g, '').toUpperCase();
    const masked = clean.replace(/(.{4})/g, '$1 ').trim();
    document.getElementById('m-iban').value = masked;
    
    if(clean.length >= 8) {
       const code = clean.substring(4, 8);
       const bank = this.bankDict[code] || { n: 'ENTIDAD DESCONOCIDA', s: '---' };
       const nameInp = document.getElementById('m-nombre');
       const swiftInp = document.getElementById('m-swift');
       if(nameInp && (!nameInp.value || nameInp.value === 'ENTIDAD DESCONOCIDA')) nameInp.value = bank.n;
       if(swiftInp) swiftInp.value = bank.s;
    }
  },

               <div class="col-md-3"><label class="h-label-refined">HOJA</label><input type="text" id="reg-hoja" class="form-control h-form-control" value="${reg.hoja||''}"></div>
               <div class="col-md-3"><label class="h-label-refined">INSCRIPCIÓN</label><input type="text" id="reg-inscripcion" class="form-control h-form-control" value="${reg.inscripcion||''}"></div>
            </div>
         </div>

         <div class="col-md-12 mt-5 d-flex gap-3"><button class="btn btn-light border fw-bold px-5" onclick="SettingsView.editingMaster=null; SettingsView.renderContent()">DESCARTAR</button><button class="btn btn-dark flex-grow-1 fw-black py-2 shadow" id="btn-save-master" onclick="SettingsView.saveMaster()">SINCRONIZAR SEDE</button></div>
      </div>`;
  },

  handleLogo: function(input) {
    const file = input.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (e) => {
      this.editingMaster.logo_url = e.target.result;
      const img = document.getElementById('logo-img');
      const icon = document.getElementById('logo-icon');
      if(img) { img.src = e.target.result; img.classList.remove('d-none'); }
      if(icon) { icon.classList.add('d-none'); }
    };
    reader.readAsDataURL(file);
  },

  loadMunicipios: async function(provincia) {
    const datalist = document.getElementById('list-municipios');
    const input = document.getElementById('comp-pob');
    if (!datalist || !input) return;
    
    input.value = '';
    datalist.innerHTML = '<option value="CARGANDO...">';
    
    const res = await HandooApp.api('admin.get_municipios', { provincia: provincia.toUpperCase() });
    
    datalist.innerHTML = '';
    if (res.ok && Array.isArray(res.data)) {
      res.data.forEach(m => {
        const option = document.createElement('option');
        option.value = m.toUpperCase();
        datalist.appendChild(option);
      });
    }
  },

  saveMaster: async function() {
    const c = this.editingMaster;
    const nameInput = document.getElementById('m-nombre') || document.getElementById('comp-nombre-fiscal');
    if(!nameInput || !nameInput.value) return HandooApp.ui.showToast("Nombre requerido", "error");

    let updated = { id: c.id, type: c.type };

    if(c.type === 'COMPANY') {
       updated.nombre_fiscal = nameInput.value.toUpperCase();
       updated.nombre = updated.nombre_fiscal;
       updated.cif = document.getElementById('comp-cif').value.toUpperCase();
       updated.email = document.getElementById('comp-email').value;
       updated.telefono = document.getElementById('comp-tel').value;
       updated.favorita = document.getElementById('comp-favorita').checked;
       updated.logo_url = c.logo_url;
       updated.direccion_fiscal = { 
          nombre: document.getElementById('comp-calle').value, 
          num: document.getElementById('comp-num').value, 
          portal: document.getElementById('comp-portal').value,
          escalera: document.getElementById('comp-esc').value,
          pob: document.getElementById('comp-pob').value, 
          cp: document.getElementById('comp-cp').value, 
          prov: document.getElementById('comp-prov').value,
          pais: document.getElementById('comp-pais').value
       };
       updated.registro = { tomo: document.getElementById('reg-tomo').value, folio: document.getElementById('reg-folio').value, hoja: document.getElementById('reg-hoja').value, inscripcion: document.getElementById('reg-inscripcion').value };
    } 
    else if(c.type === 'SERIES') {
       updated.nombre = nameInput.value.toUpperCase();
       updated.prefijo = document.getElementById('m-prefijo').value.toUpperCase();
       updated.inicio = parseInt(document.getElementById('m-inicio').value) || 1;
       updated.tipo_serie = document.getElementById('m-tipo-serie').value;
       updated.pgc_root = document.getElementById('m-pgc-root')?.value || '700';
    }
    else if(c.type === 'TAX') {
       updated.nombre = nameInput.value.toUpperCase();
       updated.valor = parseFloat(document.getElementById('m-valor').value);
       updated.total_repercutido = document.getElementById('m-acc-sales').value;
       updated.total_soportado = document.getElementById('m-acc-purch').value;
       updated.pgc_root = '477';
    }
    else if(c.type === 'RETENTION') {
       updated.nombre = nameInput.value.toUpperCase();
       updated.valor = parseFloat(document.getElementById('m-valor').value);
       updated.total_venta = document.getElementById('m-acc-sales').value;
       updated.total_compra = document.getElementById('m-acc-purch').value;
       updated.pgc_root = '473';
    }
    else if(c.type === 'BANK_ACCOUNT') {
       updated.nombre = nameInput.value.toUpperCase();
       updated.iban = document.getElementById('m-iban').value.replace(/\s/g,'');
       updated.swift = document.getElementById('m-swift')?.value || 'CREDIT';
       updated.pgc_root = document.getElementById('m-pgc-root')?.value || '572';
    }
    else if(c.type === 'PLAN' || c.type === 'MODULE') {
       updated.nombre = nameInput.value.toUpperCase();
       updated.descripcion = document.getElementById('m-desc').value;
       updated.precio = parseFloat(document.getElementById('m-precio').value || 0);
       updated.active_modules = Array.from(document.querySelectorAll('.m-feat-check:checked')).map(cb => cb.value);
    }
    else {
       updated.nombre = nameInput.value.toUpperCase();
       updated.ref_interna = document.getElementById('m-ref').value;
       updated.descripcion = document.getElementById('m-desc').value;
       updated.pvp = parseFloat(document.getElementById('m-pvp').value || 0);
    }

    HandooApp.ui.setLoading('btn-save-master', true);
    const res = await HandooApp.api('masters.save', { master: updated });
    HandooApp.ui.setLoading('btn-save-master', false);
    if(res.ok) { this.editingMaster = null; this.load(); } else { HandooApp.ui.showToast(res.msg, "error"); }
  },

  deleteMaster: async function(id) {
    if(await HandooApp.ui.confirm("¿ELIMINAR REGISTRO MAESTRO?")) {
      await HandooApp.api('masters.delete', {id});
      this.load();
    }
  },

  saveAll: async function(btnContext = null) {
    const payload = {};
    const getVal = (id) => document.getElementById(id)?.value;
    const getCheck = (id) => document.getElementById(id)?.checked;

    // PARÁMETROS GLOBALES
    if(document.getElementById('set-fixed-costs')) payload.fixed_costs = parseFloat(getVal('set-fixed-costs') || 0);
    if(document.getElementById('set-currency')) payload.system_currency = getVal('set-currency');
    if(document.getElementById('set-profile')) payload.sector_profile = getVal('set-profile');
    if(document.getElementById('set-credit-threshold')) payload.credit_expiry_threshold = parseInt(getVal('set-credit-threshold') || 30);
    if(document.getElementById('set-decimal-precision')) payload.decimal_precision = parseInt(getVal('set-decimal-precision') || 2);
    if(document.getElementById('set-write-off-credit')) payload.write_off_credit_acc = getVal('set-write-off-credit');
    if(document.getElementById('set-write-off-debit')) payload.write_off_debit_acc = getVal('set-write-off-debit');
    
    // PARÁMETROS AUTOPILOT / G-INBOUND / AI
    if(document.getElementById('ap-active')) payload.autopilot_active = getCheck('ap-active');
    if(document.getElementById('ap-confidence')) payload.autopilot_confidence_min = parseInt(getVal('ap-confidence') || 95);
    if(document.getElementById('ap-deviation')) payload.autopilot_max_deviation = parseInt(getVal('ap-deviation') || 2);
    if(document.getElementById('gi-active')) payload.ginbound_active = getCheck('gi-active');
    if(document.getElementById('gi-label')) payload.ginbound_label = getVal('gi-label');
    if(document.getElementById('gi-whitelist')) payload.ginbound_whitelist_only = getCheck('gi-whitelist');
    if(document.getElementById('ai-api-key')) payload.ai_api_key = getVal('ai-api-key');
    if(document.getElementById('ai-model')) payload.ai_model = getVal('ai-model');
    if(document.getElementById('ai-auto-pilot')) payload.ai_auto_pilot = getCheck('ai-auto-pilot');

    // PARÁMETROS DE FRANJAS DE TURNO (Solo guarda si la tabla existe en la pantalla actual)

    // BLINDAJE TITANIUM: Cargar animación de forma segura en el botón presionado
    const btn = btnContext || (window.event ? window.event.target.closest('button') : document.getElementById('btn-save-settings'));
    const originalText = btn ? btn.innerHTML : '';
    if(btn) { btn.innerHTML = '<i class="spinner-border spinner-border-sm me-2"></i> GUARDANDO...'; btn.disabled = true; }
    
    const res = await HandooApp.api('admin.save_settings', payload);
    
    if(btn) { btn.innerHTML = originalText; btn.disabled = false; }
    
    if(res.ok) {
       HandooApp.ui.showToast("Sincronizado correctamente", "success");
       this.load();
    } else {
       HandooApp.ui.showToast(res.msg, "error");
    }
  },

  saveAutomation: async function() {
    const active = document.getElementById('auto-active').checked;
    const hour = parseInt(document.getElementById('auto-hour').value);
    HandooApp.ui.setLoading('btn-save-auto', true);
    await HandooApp.api('subscription.save_auto_config', { active, hour });
    HandooApp.ui.setLoading('btn-save-auto', false);
    HandooApp.ui.showToast("Automatización Actualizada");
    this.load();
  },

  saveStripeConfig: async function() {
    const payload = { secret_key: document.getElementById('st-secret').value, public_key: document.getElementById('st-public').value };
    HandooApp.ui.setLoading('btn-save-stripe', true);
    await HandooApp.api('stripe.save_config', payload);
    HandooApp.ui.setLoading('btn-save-stripe', false);
    HandooApp.ui.showToast("Stripe Cloud Sincronizado");
  },

  saveClosingDate: async function() {
    const val = document.getElementById('set-closing-date').value;
    HandooApp.ui.setLoading('btn-save-closing', true);
    await HandooApp.api('admin.save_settings', { closing_date: val });
    HandooApp.ui.setLoading('btn-save-closing', false);
    HandooApp.ui.showToast("Protocolo de Cierre Actualizado");
    this.load();
  },

  saveNeuralSettings: async function() {
    const payload = {
        ai_api_key: document.getElementById('set-ai-api-key').value,
        ai_model: document.getElementById('set-ai-model').value,
        ai_auto_pilot: document.getElementById('set-ai-autopilot').value === 'true'
    };
    
    HandooApp.ui.setLoading('btn-save-ai-neural', true);
    const res = await HandooApp.api('admin.save_settings', payload);
    HandooApp.ui.setLoading('btn-save-ai-neural', false);
    
    if(res.ok) {
       HandooApp.ui.showToast("Configuración Neural Sincronizada", "success");
       this.load();
    } else {
       HandooApp.ui.showToast(res.msg, "error");
    }
  }
};
</script>
