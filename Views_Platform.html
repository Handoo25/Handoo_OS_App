<style>
  .v-tabs-container { display: flex; background: white; border: 1px solid var(--border); border-radius: 24px; overflow: hidden; min-height: 850px; box-shadow: 0 10px 40px rgba(0,0,0,0.05); }
  .v-tabs-sidebar { width: 300px; background: #f8fafc; border-right: 1px solid var(--border); flex-shrink: 0; padding-top: 25px; }
  .v-tab-btn { 
    display: flex; align-items: center; gap: 15px; padding: 20px 30px; border: none; background: none; 
    width: 100%; text-align: left; font-weight: 800; color: #64748b; transition: 0.3s; 
    border-bottom: 1px solid #f1f5f9; font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em;
  }
  .v-tab-btn:hover { background: #f1f5f9; color: var(--dark); }
  .v-tab-btn.active { background: white; color: var(--dark); border-right: 6px solid var(--brand); }
  .v-tab-btn i { font-size: 1.4rem; color: #94a3b8; transition: 0.3s; width: 24px; text-align: center; }
  .v-tab-btn.active i { color: var(--brand); }
  .v-tabs-content { flex-grow: 1; padding: 40px; overflow-y: auto; background: white; }

  /* PATRÓN DE BLOQUE UNIFICADO TITANIUM */
  .unified-block { padding: 24px; border-radius: 16px; box-shadow: 0 1px 3px 0 rgba(0,0,0,0.1); margin-top: 16px; transition: 0.3s; }
  .block-light { background: #f8fafc; border: 1px solid #e2e8f0; color: #1e293b; }
  .block-dark { background: #0f172a; border: 1px solid #1e293b; color: #fff; }
  .block-dark .text-muted { color: #94a3b8 !important; }
  .block-dark .form-control, .block-dark .form-select { background: #1e293b; border-color: #334155; color: #fff; font-size: 11px; }
  
  .block-header-title { font-size: 12px !important; font-weight: 900; margin: 0; text-transform: uppercase; }
  .block-header-desc { font-size: 11px; margin: 0; }

  .h-form-control { height: 42px; border-radius: 10px; font-size: 13px; border-color: #e2e8f0; font-weight: 600; }
  .h-label-refined { font-size: 10px; font-weight: 800; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; display: block; }

  .risk-indicator { border-radius: 8px; padding: 4px 10px; font-weight: 900; font-size: 9px; text-transform: uppercase; }
  .risk-white { background: white; color: var(--dark); border: 1px solid #e2e8f0; }
  .risk-yellow { background: #f59e0b; color: #0f172a; }
  .risk-red { background: #ef4444; color: white; animation: h-pulse-red 2s infinite; }

  .bank-card { background: white; border: 1px solid #e2e8f0; border-radius: 12px; padding: 15px; margin-bottom: 10px; transition: 0.3s; }
  .bank-card.is-fav { border-color: var(--brand); background: #fffdf5; }

  .alert-lock-titanium { background: #fee2e2; border: 2px solid #ef4444; color: #991b1b; padding: 15px 30px; border-radius: 14px; margin-bottom: 25px; display: flex; align-items: center; gap: 20px; animation: slideDown 0.4s ease; }

  .sede-item { cursor: pointer; transition: 0.3s; border: 1px solid #e2e8f0; border-radius: 16px; padding: 20px; margin-bottom: 12px; background: white; }
  .sede-item:hover { border-color: var(--brand); transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05); }

  @keyframes h-pulse-red { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); } 70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }
  @keyframes slideDown { from { transform: translateY(-20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
</style>

<script>
window.ClientsView = {
  cache: [],
  allSubscriptions: [],
  allInvoices: [],
  allEffects: [],
  settings: null,
  currentClient: null,
  activeTab: 'fiscal',
  historyFilters: { status: 'ALL', start: '', end: '' },

  bankDict: {
    '0049': { n: 'SANTANDER', s: 'BSCH ES MM' },
    '0182': { n: 'BBVA', s: 'BBVA ES MM' },
    '2100': { n: 'CAIXABANK', s: 'CAIX ES BB' },
    '0081': { n: 'SABADELL', s: 'BSAB ES BB' },
    '0128': { n: 'BANKINTER', s: 'BKNTE ES MM' },
    '2038': { n: 'BANKIA / CAIXA', s: 'CAIX ES BB' },
    '0239': { n: 'EVO BANK', s: 'EVOB ES MM' },
    '0149': { n: 'BNP PARIBAS', s: 'BNPA ES MM' }
  },

  render: async function() {
    const stage = document.getElementById('main-stage');
    stage.innerHTML = `
      <div class="bg-dark text-white px-5 py-4 d-flex justify-content-between align-items-center sticky-top shadow">
         <div><h6 class="h-label text-white-50">SISTEMA DE ENTIDADES</h6><h2 class="fw-black m-0 text-uppercase">Gestión de Clientes</h2></div>
         <button class="h-btn bg-white text-dark px-4 py-2 fw-black shadow-sm" onclick="ClientsView.openForm('new')">+ NUEVO CLIENTE</button>
      </div>
      <div class="p-5 animate-slide">
         <div class="card-industrial border-0 overflow-hidden shadow-sm">
            <div class="p-4 bg-light border-bottom">
               <div class="row g-2 align-items-end">
                  <div class="col-md-5">
                     <label class="h-label-refined">BÚSQUEDA INTELIGENTE</label>
                     <div class="input-group"><span class="input-group-text bg-white border-end-0"><i class="bi bi-search"></i></span><input type="text" id="cli-search" class="form-control border-start-0 ps-0 h-form-control" placeholder="Nombre, CIF o ID..." onkeyup="ClientsView.applyFilters()"></div>
                  </div>
                  <div class="col-md-3">
                     <label class="h-label-refined">ESTADO OPERATIVO</label>
                     <select id="cli-filter-status" class="form-select h-form-control fw-bold" onchange="ClientsView.applyFilters()"><option value="ALL" selected>TODOS</option><option value="Activo">SOLO ACTIVOS</option><option value="Suspensión">SUSPENSIÓN</option><option value="Baja">BAJA</option></select>
                  </div>
                  <div class="col-md-4 text-end d-flex align-items-center justify-content-end pb-1" id="cli-counter-container">
                     <div class="d-flex align-items-center gap-2 small text-muted fw-bold">
                        <div class="spinner-border spinner-border-sm text-brand" style="width: 14px; height: 14px;"></div>
                        <span>SINCRONIZANDO KERNEL...</span>
                     </div>
                  </div>
               </div>
            </div>
            <div class="table-responsive">
               <table class="table table-hover m-0 align-middle">
                  <thead class="bg-light"><tr><th class="ps-4">ID</th><th>RAZÓN SOCIAL / EXPOSICIÓN</th><th class="text-center">CIF</th><th class="text-center">ESTADO</th><th class="text-end pe-4">GESTIÓN</th></tr></thead>
                  <tbody id="cli-table-body"></tbody>
               </table>
            </div>
         </div>
      </div>`;
    this.load();
  },

  load: async function() {
    const [resC, resS, resSub, resInv, resEff] = await Promise.all([
      HandooApp.api('platform.get_clients'), 
      HandooApp.api('admin.get_settings'),
      HandooApp.api('subscription.list'),
      HandooApp.api('invoice.get_history'),
      HandooApp.api('treasury.list_all_effects')
    ]);
    if(resC.ok) this.cache = resC.data || [];
    if(resS.ok) this.settings = resS.data;
    if(resSub.ok) this.allSubscriptions = resSub.data || [];
    if(resInv.ok) this.allInvoices = resInv.data || [];
    if(resEff.ok) this.allEffects = resEff.data || [];
    this.applyFilters();
  },

  validateIBAN: function(iban) {
    const clean = iban.replace(/\s/g, '').toUpperCase();
    if (!/^[A-Z]{2}[0-9]{2}[A-Z0-9]{4,30}$/.test(clean)) return false;
    const rearranged = clean.slice(4) + clean.slice(0, 4);
    const numeric = rearranged.split('').map(c => {
      const code = c.charCodeAt(0);
      return code >= 65 && code <= 90 ? (code - 55).toString() : c;
    }).join('');
    let remainder = numeric;
    while (remainder.length > 2) {
      let block = remainder.slice(0, 9);
      remainder = (parseInt(block, 10) % 97).toString() + remainder.slice(block.length);
    }
    return parseInt(remainder, 10) % 97 === 1;
  },

  applyFilters: function() {
    const q = document.getElementById('cli-search')?.value.toLowerCase() || "";
    const status = document.getElementById('cli-filter-status')?.value || "ALL";
    const filtered = this.cache.filter(c => {
      const matchQ = !q || (c.nombre_fiscal||'').toLowerCase().includes(q) || (c.cif||'').toLowerCase().includes(q);
      const matchS = status === 'ALL' || c.estado === status;
      return matchQ && matchS;
    });
    this.renderRows(filtered);
    
    const counter = document.getElementById('cli-counter-container');
    if(counter) {
      counter.innerHTML = `
        <div class="small text-muted fw-black text-uppercase animate-slide" style="font-size: 10px; letter-spacing: 0.5px;">
           <i class="bi bi-check2-circle text-success me-1"></i> REGISTROS LOCALIZADOS: ${filtered.length}
        </div>`;
    }
  },

  renderRows: function(data) {
    const body = document.getElementById('cli-table-body');
    const bals = this.settings?.balances || {};
    body.innerHTML = data.map(c => {
      const exp430 = parseFloat(bals[c.cuenta_contable] || 0);
      const exp431 = parseFloat(bals[c.cuenta_contable?.replace('430','431')] || 0);
      const exp4315 = parseFloat(bals[c.cuenta_contable?.replace('430','4315')] || 0);
      
      return `
      <tr onclick="ClientsView.openForm('${c.id}')" style="cursor:pointer">
         <td class="ps-4 font-monospace small text-muted">${c.id}</td>
         <td>
            <div class="fw-black text-uppercase" style="font-size:12px">${escapeHTML(c.nombre_fiscal)} ${c.bloqueado_impago ? '<i class="bi bi-shield-lock-fill text-danger ms-1"></i>' : ''}</div>
            <div class="d-flex gap-2 mt-1">
               ${exp4315 > 0 ? `<span class="risk-indicator risk-red">IMPAGADO: ${exp4315.toLocaleString()}€</span>` : ''}
               ${exp431 > 0 ? `<span class="risk-indicator risk-yellow">REMESADO: ${exp431.toLocaleString()}€</span>` : ''}
               ${exp430 > 0 ? `<span class="risk-indicator risk-white">COMERCIAL: ${exp430.toLocaleString()}€</span>` : ''}
            </div>
         </td>
         <td class="text-center font-monospace small">${c.cif}</td>
         <td class="text-center"><span class="os-badge ${c.estado==='Activo'?'bg-success':(c.estado==='Baja'?'bg-danger':'bg-warning text-dark')}">${(c.estado||'Activo').toUpperCase()}</span></td>
         <td class="text-end pe-4" onclick="event.stopPropagation()"><button class="btn btn-link text-danger p-0" onclick="ClientsView.deleteClient('${c.id}')"><i class="bi bi-trash3"></i></button></td>
      </tr>`;
    }).join('') || '<tr><td colspan="5" class="p-5 text-center opacity-25 fw-black">SIN RESULTADOS</td></tr>';
  },

  openForm: function(id) {
    const today = new Date().toISOString().split('T')[0];
    const empty = { 
      id:'new', nombre_fiscal:'', cif:'', estado:'Activo', notas: '', fecha_alta: today,
      fecha_estado: '', motivo_estado: '', bloqueado_impago: false, handoo_network: false,
      direccion_fiscal: { tipo_via:'Calle', nombre:'', num:'', portal:'', escalera:'', cp:'', pob:'', prov:'' }, 
      direccion_comercial: { tipo_via:'Calle', nombre:'', num:'', portal:'', CP:'', pob:'', prov:'' }, 
      comercial: { persona_contacto:'', email_facturacion:'', email_contacto:'', telefono:'', telefono_2:'', web:'' },
      facturacion: { 
        forma_pago:'TRANSFERENCIA', vencimiento:'30', periodicidad:'Mensual',
        tipo_impuesto_valor:21, retencion:0, descuento:0, billing_type: 'CLIENT',
        nuestros_bancos:[], banco_sepa_id:'', default_series_id:'' ,
        sepa_mandato: { referencia: '', fecha_firma: '', tipo: 'Recurrente' }
      }, 
      bancos:[],
      sedes:[],
      stripe_customer_id: '',
      stripe_autopay: false
    };
    const raw = id === 'new' ? empty : this.cache.find(x => x.id === id);
    this.currentClient = JSON.parse(JSON.stringify(Object.assign({}, empty, raw)));
    
    if(!this.currentClient.direccion_fiscal) this.currentClient.direccion_fiscal = Object.assign({}, empty.direccion_fiscal);
    if(!this.currentClient.direccion_comercial) this.currentClient.direccion_comercial = Object.assign({}, empty.direccion_comercial);
    if(!this.currentClient.comercial) this.currentClient.comercial = empty.comercial;
    if(!this.currentClient.facturacion) this.currentClient.facturacion = empty.facturacion;
    if(!this.currentClient.facturacion.sepa_mandato) this.currentClient.facturacion.sepa_mandato = empty.facturacion.sepa_mandato;
    if(!this.currentClient.bancos) this.currentClient.bancos = [];
    if(!this.currentClient.sedes) this.currentClient.sedes = [];
    
    this.renderFormContainer();
  },

  navigate: function(direction) {
      if (!this.cache || this.cache.length <= 1) return;
      const currentId = this.currentClient.id;
      const currentIndex = this.cache.findIndex(c => String(c.id) === String(currentId));
      
      let targetIndex = currentIndex + direction;
      if (targetIndex < 0) targetIndex = this.cache.length - 1;
      if (targetIndex >= this.cache.length) targetIndex = 0;
      
      this.openForm(this.cache[targetIndex].id);
  },

  renderFormContainer: function() {
    const c = this.currentClient;
    document.getElementById('main-stage').innerHTML = `
      <div class="bg-white border-bottom px-5 py-4 d-flex justify-content-between align-items-center sticky-top shadow-sm">
         <div class="d-flex align-items-center gap-4">
            <button class="btn btn-link text-dark p-0" onclick="ClientsView.render()"><i class="bi bi-arrow-left-circle-fill fs-3"></i></button>
            <div class="d-flex align-items-center gap-2">
                <button class="h-nav-arrow" onclick="ClientsView.navigate(-1)"><i class="bi bi-chevron-left"></i></button>
                <div><h6 class="h-label text-muted">EXPEDIENTE: ${c.id}</h6><h2 class="fw-black m-0 text-uppercase">${escapeHTML(c.nombre_fiscal) || 'NUEVA ENTIDAD'}</h2></div>
                <button class="h-nav-arrow" onclick="ClientsView.navigate(1)"><i class="bi bi-chevron-right"></i></button>
            </div>
         </div>
         <div class="d-flex gap-2">
            <button class="btn btn-light border px-4 fw-bold" onclick="ClientsView.render()">DESCARTAR</button>
            <button id="btn-save-cli" class="h-btn h-btn-dark px-5 py-2 shadow" onclick="ClientsView.save()">SINCRONIZAR KERNEL</button>
         </div>
      </div>
      <div class="p-5">
         ${c.bloqueado_impago ? `
            <div class="alert-lock-titanium shadow-sm">
               <i class="bi bi-shield-lock-fill fs-1"></i>
               <div>
                  <h6 class="fw-black m-0 text-uppercase" style="font-size:13px">Bloqueo de Seguridad Activo</h6>
                  <p class="m-0 small fw-bold opacity-75">Este expediente ha sido restringido por impago técnico. El motor de facturación no procesará nuevos cargos hasta la regularización.</p>
               </div>
               <button class="btn btn-sm btn-danger ms-auto fw-black" onclick="ClientsView.unlockClient()">DESBLOQUEAR MANUAL</button>
            </div>
         ` : ''}
         <div class="v-tabs-container animate-slide"><div class="v-tabs-sidebar" id="c-tabs-nav"></div><div class="v-tabs-content" id="c-tabs-content"></div></div>
      </div>`;
    this.renderTabs();
  },

  unlockClient: function() {
    this.currentClient.bloqueado_impago = false;
    HandooApp.ui.showToast("Restricción de seguridad eliminada provisionalmente.");
    this.renderActiveTabContent();
  },

  renderTabs: function() {
    const activeModules = this.settings?.active_modules || [];
    const hasSedes = activeModules.includes('FEAT_SEDES');
    const hasSubs = activeModules.includes('FEAT_SUBSCRIPTIONS');

    const tabs = [
      {id:'fiscal', icon:'bi-bank', label:'Fiscal / Identidad'},
      {id:'comercial', icon:'bi-chat-dots', label:'Comercial / Localización'},
      {id:'cobro', icon:'bi-credit-card', label:'Cobro y Multi-Banca'},
      {id:'subs', icon:'bi-stars', label:'Licencias / Recurrencia', hidden: !hasSubs},
      {id:'history', icon:'bi-receipt', label:'Facturación (Historial)'},
      {id:'sedes', icon:'bi-building', label:'Sedes y Logística', hidden: !hasSedes},
      {id:'audit', icon:'bi-shield-check', label:'Auditoría de Control'}
    ].filter(t => !t.hidden);

    if (!tabs.find(t => t.id === this.activeTab)) {
      this.activeTab = 'fiscal';
    }

    document.getElementById('c-tabs-nav').innerHTML = tabs.map(t => `<button class="v-tab-btn ${this.activeTab===t.id?'active':''}" onclick="ClientsView.setTab('${t.id}')"><i class="${t.icon}"></i> ${t.label}</button>`).join('');
    this.renderActiveTabContent();
  },

  setTab: function(id) { this.syncLocal(); this.activeTab = id; this.renderTabs(); },

  syncLocal: function() {
    const c = this.currentClient;
    const g = (id) => document.getElementById(id)?.value;
    
    if(g('f-nombre')) c.nombre_fiscal = g('f-nombre');
    if(g('f-cif')) c.cif = g('f-cif');
    if(g('f-estado')) c.estado = g('f-estado');
    if(g('f-notas')) c.notas = g('f-notas');
    if(g('f-fecha-estado')) c.fecha_estado = g('f-fecha-estado');
    if(g('f-motivo-estado')) c.motivo_estado = g('f-motivo-estado');
    if(document.getElementById('f-bloqueo')) c.bloqueado_impago = document.getElementById('f-bloqueo').checked;
    if(document.getElementById('f-handoo-network')) c.handoo_network = document.getElementById('f-handoo-network').checked;

    if(document.getElementById('f-via')) {
      c.direccion_fiscal.tipo_via = g('f-via');
      c.direccion_fiscal.nombre = g('f-calle');
      c.direccion_fiscal.num = g('f-num');
      c.direccion_fiscal.portal = g('f-portal');
      c.direccion_fiscal.escalera = g('f-esc');
      c.direccion_fiscal.piso = g('f-piso');
      c.direccion_fiscal.puerta = g('f-pta');
      c.direccion_fiscal.cp = g('f-cp');
      c.direccion_fiscal.pob = g('f-pob');
      c.direccion_fiscal.prov = g('f-prov');
    }

    if(document.getElementById('cm-via')) {
      c.direccion_comercial.tipo_via = g('cm-via');
      c.direccion_comercial.nombre = g('cm-calle');
      c.direccion_comercial.num = g('cm-num');
      c.direccion_comercial.portal = g('cm-portal');
      c.direccion_comercial.escalera = g('cm-esc');
      c.direccion_comercial.piso = g('cm-piso');
      c.direccion_comercial.puerta = g('cm-pta');
      c.direccion_comercial.cp = g('cm-cp');
      c.direccion_comercial.pob = g('cm-pob');
      c.direccion_comercial.prov = g('cm-prov');
    }

    if(document.getElementById('c-email-fac')) {
      c.comercial.persona_contacto = g('c-persona');
      c.comercial.email_facturacion = g('c-email-fac');
      c.comercial.email_contacto = g('c-email-con');
      c.comercial.telefono = g('c-tel');
      c.comercial.telefono_2 = g('c-tel2');
      c.comercial.web = g('c-web');
    }

    if(document.getElementById('b-metodo')) {
      c.facturacion.forma_pago = g('b-metodo');
      c.facturacion.vencimiento = g('b-vto');
      c.facturacion.periodicidad = g('b-periodo');
      c.facturacion.billing_type = g('b-billing-type');
      c.facturacion.tipo_impuesto_valor = parseFloat(g('b-iva') || 0);
      c.facturacion.retencion = parseFloat(g('b-retencion') || 0);
      c.facturacion.descuento = parseFloat(g('b-descuento') || 0);
      c.facturacion.banco_sepa_id = g('b-banco-cliente');
      c.facturacion.nuestros_bancos = Array.from(document.querySelectorAll('.ck-nuestro-banco:checked')).map(ck => ck.value);
      
      if(document.getElementById('s-mandato-ref')) {
        c.facturacion.sepa_mandato = {
          referencia: g('s-mandato-ref'),
          fecha_firma: g('s-mandato-fecha'),
          tipo: g('s-mandato-tipo')
        };
      }
    }

    if(document.getElementById('s-stripe-id')) {
      c.stripe_customer_id = g('s-stripe-id');
      c.stripe_autopay = document.getElementById('s-stripe-auto').checked;
    }
  },

  renderActiveTabContent: function() {
    const c = this.currentClient;
    const container = document.getElementById('c-tabs-content');
    const bals = this.settings?.balances || {};
    const masters = this.settings?.masters || {};
    const activeModules = this.settings?.active_modules || [];
    
    if(this.activeTab === 'fiscal') {
      container.innerHTML = `
        <div class="animate-slide">
           <div class="unified-block block-light mt-0">
              <div class="row align-items-center mb-3">
                 <div class="col-md-1 text-center"><i class="bi bi-bank fs-2 text-brand"></i></div>
                 <div class="col-md-11"><h6 class="block-header-title">Identidad Legal y Jurídica</h6><p class="block-header-desc text-muted">Datos oficiales y cronología de registro.</p></div>
              </div>
              <div class="row g-3">
                 <div class="col-md-6"><label class="h-label-refined">RAZÓN SOCIAL</label><input type="text" id="f-nombre" class="form-control h-form-control fw-black text-uppercase" value="${escapeHTML(c.nombre_fiscal)}"></div>
                 <div class="col-md-3"><label class="h-label-refined">CIF / NIF</label><input type="text" id="f-cif" class="form-control h-form-control font-monospace fw-bold" value="${c.cif}"></div>
                 <div class="col-md-3"><label class="h-label-refined">FECHA DE ALTA</label><input type="date" class="form-control h-form-control bg-white" readonly value="${c.fecha_alta ? c.fecha_alta.split('T')[0] : ''}"></div>
              </div>
              <div class="row g-3 mt-1">

  detectIBAN: function(val) {
    let clean = val.replace(/\s/g, '').toUpperCase();
    const masked = clean.replace(/(.{4})/g, '$1 ').trim();
    document.getElementById('b-iban-val').value = masked;
    
    const isValid = !clean || this.validateIBAN(clean);
    const btn = document.getElementById('btn-save-bank-cli');
    const msg = document.getElementById('iban-cli-error');
    if (btn) btn.disabled = !isValid;
    if (msg) msg.style.display = isValid ? 'none' : 'block';

    if(clean.length >= 8) {
       const code = clean.substring(4, 8);
       const bank = this.bankDict[code] || { n: 'ENTIDAD DESCONOCIDA', s: '---' };
       document.getElementById('b-entidad').value = bank.n;
       document.getElementById('b-swift').value = bank.s;
    }
  },

  detectSedeIBAN: function(val) {
    let clean = val.replace(/\s/g, '').toUpperCase();
    const masked = clean.replace(/(.{4})/g, '$1 ').trim();
    document.getElementById('s-iban').value = masked;
    
    const isValid = !clean || this.validateIBAN(clean);
    const btn = document.getElementById('btn-action-save-sede');
    const msg = document.getElementById('s-iban-error');
    if (btn) btn.disabled = !isValid;
    if (msg) msg.style.display = isValid ? 'none' : 'block';
  },

  saveBank: function() {
    const ibanVal = document.getElementById('b-iban-val').value.replace(/\s/g, '').toUpperCase();
    if(!this.validateIBAN(ibanVal)) return HandooApp.ui.showToast("IBAN Inválido", "error");

    const bank = {
       alias: document.getElementById('b-alias').value || 'Cuenta',
       iban: ibanVal,
       entidad: document.getElementById('b-entidad').value,
       swift: document.getElementById('b-swift').value,
       is_fav: this.currentClient.bancos.length === 0
    };
    this.currentClient.bancos.push(bank);
    document.querySelector('.h-modal-overlay').remove();
    this.renderActiveTabContent();
  },

    this.currentClient.bancos.forEach((b, i) => b.is_fav = (i === idx));

                              <label class="h-label text-white-50">IBAN COMPLETO (REQUERIDO MOD-97)</label>
                              <input type="text" id="s-iban" class="form-control bg-dark border-secondary text-brand fw-black h-form-control font-monospace" value="${sede.facturacion?.iban || ''}" placeholder="ES00 0000..." oninput="ClientsView.detectSedeIBAN(this.value)">
                              <div id="s-iban-error" class="text-danger small fw-bold mt-1" style="display:none; font-size:10px;"><i class="bi bi-exclamation-triangle-fill"></i> Algoritmo de Validación Mod-97 Fallido.</div>
                           </div>
                           <div class="col-md-4">
                              <label class="h-label text-white-50">BIC / SWIFT</label>
                              <input type="text" id="s-swift" class="form-control bg-dark border-secondary text-white h-form-control" value="${sede.facturacion?.swift || ''}" placeholder="XXXXXXXX">
                           </div>
                        </div>
                     </div>
                  </div>
               </div>

               <div class="unified-block block-dark">
                  <div class="row align-items-center mb-3">
                     <div class="col-md-1 text-center"><i class="bi bi-receipt fs-2 text-brand"></i></div>
                     <div class="col-md-11"><h6 class="block-header-title">Condiciones Comerciales de Sede</h6><p class="block-header-desc text-muted">Configuración propia para esta ubicación.</p></div>
                  </div>
                  <div class="row g-3">
                     <div class="col-md-6"><label class="h-label text-white-50">FORMA PAGO</label><select id="s-pago" class="form-select h-form-control">${(masters.payment_methods||[]).map(pm => `<option value="${pm.nombre}" ${sede.facturacion.forma_pago===pm.nombre?'selected':''}>${pm.nombre.toUpperCase()}</option>`).join('')}</select></div>
                     <div class="col-md-6"><label class="h-label text-white-50">Nº PLAZOS (FRACCIONES)</label><select id="s-vto" class="form-select h-form-control">${(masters.payment_terms||[]).map(pt => `<option value="${pt.id}" ${sede.facturacion.vencimiento===pt.id?'selected':''}>${pt.nombre.toUpperCase()}</option>`).join('')}</select></div>
                     <div class="col-md-4"><label class="h-label text-white-50">IVA (%)</label><select id="s-iva" class="form-select h-form-control">${(masters.taxes||[]).map(t => `<option value="${t.valor}" ${parseFloat(sede.facturacion.tipo_impuesto_valor)===parseFloat(t.valor)?'selected':''}>${t.nombre} (${t.valor}%)</option>`).join('')}</select></div>
                     <div class="col-md-4"><label class="h-label text-white-50">IRPF (%)</label><select id="s-ret" class="form-select h-form-control text-danger">${(masters.retentions||[]).map(r => `<option value="${r.valor}" ${parseFloat(sede.facturacion.retencion)===parseFloat(r.valor)?'selected':''}>${r.nombre} (${r.valor}%)</option>`).join('')}</select></div>
                     <div class="col-md-4"><label class="h-label text-white-50">DTO (%)</label><select id="s-dto" class="form-select h-form-control text-brand">${(masters.discounts||[]).map(d => `<option value="${d.pvp || d.valor}" ${parseFloat(sede.facturacion.descuento)===parseFloat(d.pvp || d.valor)?'selected':''}>${d.nombre} (${d.pvp || d.valor}%)</option>`).join('')}</select></div>
                  </div>
               </div>
            ` : ''}
            <div class="unified-block block-light">
               <label class="h-label">NOTAS LOGÍSTICAS / OBSERVACIONES</label>
               <textarea id="s-notas" class="form-control" rows="3" placeholder="Horario de muelle, accesos restringidos...">${sede.notas || ''}</textarea>
            </div>
         </div>
         <div class="h-modal-footer">
            <button class="btn btn-light border fw-bold flex-grow-1" onclick="this.closest('.h-modal-overlay').remove()">CANCELAR</button>
            <button id="btn-action-save-sede" class="btn btn-dark fw-black flex-grow-1 shadow" onclick="ClientsView.executeSaveSede('${idx}')">GUARDAR CAMBIOS</button>
         </div>
      </div>`;
    document.body.appendChild(overlay);
  },

  executeSaveSede: function(idxStr) {
    const idx = parseInt(idxStr);
    const isNew = idx === -1;
    const s = isNew ? { id: Date.now() } : this.currentClient.sedes[idx];
    
    s.nombre = document.getElementById('s-nombre').value;
    s.contacto = document.getElementById('s-contacto').value;
    s.telefono = document.getElementById('s-tel').value;
    s.notas = document.getElementById('s-notas').value;
    s.direccion = { nombre: document.getElementById('s-calle').value, num: document.getElementById('s-num').value, cp: document.getElementById('s-cp').value, pob: document.getElementById('s-pob').value };
    
    if (document.getElementById('s-pago')) {
      // BLINDAJE V131: Validación de IBAN previa al guardado
      const ibanVal = document.getElementById('s-iban')?.value || '';
      if(ibanVal && !this.validateIBAN(ibanVal)) {
         return HandooApp.ui.showToast("IBAN DE SEDE INVÁLIDO: No se puede sincronizar con errores algorítmicos.", "error");
      }

      s.facturacion = {
        forma_pago: document.getElementById('s-pago').value,
        vencimiento: document.getElementById('s-vto').value,
        tipo_impuesto_valor: parseFloat(document.getElementById('s-iva').value),
        retencion: parseFloat(document.getElementById('s-ret').value),
        descuento: parseFloat(document.getElementById('s-dto').value),
        periodicidad: s.facturacion?.periodicidad || 'Mensual',
        iban: ibanVal,
        swift: document.getElementById('s-swift')?.value || ''
      };
    }
    
    if(isNew) this.currentClient.sedes.push(s);
    document.querySelector('.h-modal-overlay').remove();
    this.renderActiveTabContent();
    HandooApp.ui.showToast("Sede actualizada localmente");
  },

  removeSede: function(idx) { if(confirm("¿Eliminar esta sede?")) { this.currentClient.sedes.splice(idx, 1); this.renderActiveTabContent(); } },

  save: async function() {
    this.syncLocal();
    HandooApp.ui.setLoading('btn-save-cli', true);
    const res = await HandooApp.api('platform.save_client', this.currentClient);
    HandooApp.ui.setLoading('btn-save-cli', false);
    if(res.ok) { HandooApp.ui.showToast("Expediente Sincronizado"); this.render(); }
    else { HandooApp.ui.showToast(res.msg, "error"); }
  },

  deleteClient: async function(id) {
    if(await HandooApp.ui.confirm("¿ELIMINAR CLIENTE?", "Se requiere que no tenga deudas ni facturas activas.")) {
       const res = await HandooApp.api('platform.delete_client', { id });
       if(res.ok) this.load(); else HandooApp.ui.showToast(res.msg, "error");
    }
  }
};
</script>
