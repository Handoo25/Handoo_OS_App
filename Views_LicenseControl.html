  .t-btn-primary { background: white; color: #0f172a; border: none; padding: 10px 20px; border-radius: 8px; font-weight: 900; font-size: 11px; text-transform: uppercase; transition: 0.3s; }

  renderAll: function() {
    const container = document.getElementById('lic-main-content');
    if (!container) return;
    
    container.innerHTML = `
      ${this.renderPacksHTML()}
      ${this.renderFeaturesHTML()}
      ${this.renderStrategyHTML()}
      ${this.renderBillingHTML()}
    `;
  },

  renderFeaturesHTML: function() {
    const searchTerm = (document.getElementById('lic-search')?.value || '').toLowerCase();
    const priority = ['GESTIÓN BASE', 'INVENTARIO', 'TESORERÍA', 'FACTURACIÓN'];
    
    const allCats = [...new Set(this.FEATURES_LIST.filter(f => f.cat !== 'VERTICALES').map(f => f.cat))];
    const sortedCats = allCats.sort((a, b) => {
        const idxA = priority.indexOf(a);
        const idxB = priority.indexOf(b);
        if (idxA !== -1 && idxB !== -1) return idxA - idxB;
        if (idxA !== -1) return -1;
        if (idxB !== -1) return 1;
        return a.localeCompare(b);
    });

    return sortedCats.map(cat => {
        const filteredItems = this.FEATURES_LIST.filter(f => 
            f.cat === cat && 
            (f.label.toLowerCase().includes(searchTerm) || f.desc.toLowerCase().includes(searchTerm))
        );
        
        if (filteredItems.length === 0) return '';
        
        return `
           <div class="mb-5">
              <h6 class="fw-black text-uppercase mb-4" style="font-size:11px; color: var(--brand); opacity: 0.8;">${cat}</h6>
              <div class="row g-3">
                 ${filteredItems.map(f => `
                   <div class="col-md-4 col-lg-3">
                      <div class="capability-card ${this.currentLicense.active_modules.includes(f.id)?'active':''}" onclick="LicenseControlView.toggleFeat('${f.id}')">
                         <div class="icon-box"><i class="bi ${f.icon}"></i></div>
                         <div>
                            <div class="fw-black text-uppercase" style="font-size:11px">${f.label}</div>
                            <p class="text-muted m-0" style="font-size:10px">${f.desc}</p>
                         </div>
                         <div class="ms-auto"><i class="bi ${this.currentLicense.active_modules.includes(f.id)?'bi-check-circle-fill text-brand':'bi-circle text-muted'}"></i></div>
                      </div>
                   </div>
                 `).join('')}
              </div>
           </div>`;
     }).join('');
  },

  renderPacksHTML: function() {

    const specializedPacks = this.packs.filter(p => p.type !== 'base');

    return `

                <div class="col-md-4">

                      <div class="flex-grow-1">

                            <div class="fw-black text-uppercase" style="font-size:13px">${p.name}</div>

                      </div>
                   </div>
                </div>
             `).join('')}

          <h6 class="fw-black text-uppercase mb-3 x-small text-muted" style="letter-spacing:1px">Packs de Especialización Vertical</h6>
          <div class="row g-4">
             ${specializedPacks.map(p => `
                <div class="col-md-6">
                   <div class="capability-card p-4 h-100" onclick="LicenseControlView.applyPack('${p.id}')" style="border-left: 6px solid ${p.color}">
                      <div class="icon-box" style="background: ${p.color}20; color: ${p.color}"><i class="bi ${p.icon} fs-4"></i></div>
                      <div class="flex-grow-1">
                         <div class="d-flex justify-content-between align-items-start">
                            <div class="fw-black text-uppercase" style="font-size:13px">${p.name}</div>
                            <button class="btn btn-sm btn-light border-0 p-1" onclick="event.stopPropagation(); LicenseControlView.editPack('${p.id}')" title="Editar Pack">
                               <i class="bi bi-pencil-square text-muted"></i>
                            </button>
                         </div>
                         <p class="text-muted small m-0">${p.desc}</p>
                         <div class="mt-3">
                            <div class="x-small fw-bold text-brand mb-2">${p.feats.length} MÓDULOS INCLUIDOS</div>
                            <div class="d-flex flex-wrap gap-1">
                               ${p.feats.slice(0, 5).map(fid => {
                                  const f = this.FEATURES_LIST.find(x => x.id === fid);
                                  return `<span class="badge bg-light text-dark border x-small fw-normal" style="font-size:9px">${f ? f.label : fid}</span>`;
                               }).join('')}
                               ${p.feats.length > 5 ? `<span class="badge bg-light text-muted border x-small fw-normal" style="font-size:9px">+${p.feats.length - 5} más</span>` : ''}
                            </div>
                         </div>
                      </div>
                   </div>
                </div>
             `).join('')}
          </div>
       </div>`;
  },

                </div>

                   <p class="x-small text-white-50 m-0"><i class="bi bi-shield-check me-2 text-warning"></i> Al seleccionar Giro SEPA, autoriza a Handoo OS a emitir cargos mensuales en la cuenta indicada según el consumo de módulos activos.</p>
                </div>
             ` : ''}
          </div>
       </div>`;
  },

  verifyLicenseControlIntegrity: function() {
    return `
    <div class="p-4 rounded-4 shadow-sm mt-3 container bg-dark text-white" style="background-color: #0f172a;">
      <div class="row align-items-center">
        <div class="col-md-1 text-center">
          <i class="bi bi-shield-shaded fs-2 text-brand animate-pulse"></i>
        </div>
        <div class="col-md-11 ps-4 border-start border-secondary">
          <h6 class="fw-black text-uppercase m-0" style="font-size: 11px; color: #f8fafc;">Handoo Master: Verificación de Módulos</h6>
          <p class="small mb-0 text-muted">Estructura de dependencias de IA y Estrategia verificada. El sistema de reinicio suave garantiza la persistencia sin pérdida de estado. Arquitectura 100% Titanium.</p>
        </div>
      </div>
    </div>
  `;
  },

  render: async function() {
    const stage = document.getElementById('main-stage');
    if (!stage) return;
    
    // 🔥 EMERGENCY: Ensure UI is painted even if load fails
    stage.innerHTML = `
      <div class="t-header-titanium mb-4 rounded-4 mt-4">
         <div>
            <h6>CONFIGURACIÓN DEL SISTEMA</h6>
            <h2>Gestor de Licencias y Capacidades</h2>
         </div>
         <div class="d-flex gap-2">
            <button class="t-btn-secondary" onclick="LicenseControlView.selectAll()">ACTIVAR TODO</button>
            <button id="btn-save-license" class="t-btn-primary shadow" onclick="LicenseControlView.save()"><i class="bi bi-floppy-fill me-2"></i> APLICAR CAMBIOS</button>
         </div>
      </div>
      <div class="container-fluid p-4 animate-slide">
        <div class="mb-4">
          <input type="text" id="lic-search" class="form-control h-form-control" placeholder="🔍 Buscar módulos..." oninput="LicenseControlView.renderAll()">
        </div>
        <div id="lic-main-content">
           <div class="text-center p-5"><div class="spinner-border text-brand"></div><p class="mt-2 small fw-bold">CARGANDO KERNEL...</p></div>
        </div>
      </div>`;
      
    try {
      await this.load();
      this.renderAll();
    } catch (e) {
      console.error("CRITICAL: LicenseControlView.render failed", e);
      const content = document.getElementById('lic-main-content');
      if (content) {
        content.innerHTML = `
          <div class="alert alert-danger border-0 shadow-sm rounded-4 p-4">
            <h5 class="fw-black"><i class="bi bi-exclamation-triangle-fill me-2"></i> ERROR DE SINCRONIZACIÓN</h5>
            <p class="mb-0 small">${e.message}</p>
            <button class="btn btn-sm btn-outline-danger mt-3 fw-bold" onclick="LicenseControlView.render()">REINTENTAR</button>
          </div>
        `;
      }
    }
  },

  load: async function() {
    const res = await HandooApp.api('admin.get_settings');
    if (res.ok) {
      this.settings = res.data;
      const sub = this.settings.subscription || {};
      this.currentLicense = { 
        active_modules: this.settings.active_modules || [], 
        tier: sub.tier || 'INDUSTRIAL',
        billing_iban: sub.billing_iban || '',
        payment_method: sub.payment_method || 'TRANSFERENCIA'
      };
      
      // Load packs from settings or use defaults
      this.packs = this.settings.custom_packs || [
        { 
          id: 'TIER_CORE', 
          name: 'HANDOO CORE', 
          desc: 'Configuración básica para gestión administrativa.',
          icon: 'bi-grid-1x2',
          color: '#64748b',
          tier: 'CORE',
          type: 'base',
          feats: ['FEAT_CORE_DASHBOARD', 'FEAT_CORE_CLIENTS', 'FEAT_CORE_INVOICING', 'FEAT_CATALOG_DISCOUNTS']
        },
        { 
          id: 'TIER_INDUSTRIAL', 
          name: 'HANDOO INDUSTRIAL', 
          desc: 'Empresarial completo: Tesorería, SEPA, Préstamos y Conciliación.',
          icon: 'bi-layers-half',
          color: '#1e293b',
          tier: 'INDUSTRIAL',
          type: 'base',
          feats: [
            'FEAT_CORE_DASHBOARD', 'FEAT_CORE_CLIENTS', 'FEAT_CORE_INVOICING', 
            'FEAT_DOC_COBRO', 'FEAT_BATCH_COBRO', 'FEAT_SEPA_COBRO', 
            'FEAT_DOC_PAGO', 'FEAT_BATCH_PAGO', 'FEAT_SEPA_PAGO', 
            'FEAT_FINANCIACION', 'FEAT_CIRCULANTE', 'FEAT_CONCILIACION', 'FEAT_LIBRO_MAYOR',
            'FEAT_FIXED_ASSETS', 'FEAT_OPERATIONAL_TOOLS',
            'FEAT_CATALOG_MODULES', 'FEAT_CATALOG_PLANS', 'FEAT_CATALOG_DISCOUNTS'
          ]
        },
        { 
          id: 'TIER_TITANIUM', 
          name: 'HANDOO TITANIUM', 
          desc: 'Inteligencia Total: IA CFO y Verticales completas.',
          icon: 'bi-shield-check',
          color: '#0f172a',
          tier: 'TITANIUM',
          type: 'base',
          feats: this.FEATURES_LIST.map(f => f.id)
        },
        { 
          id: 'PACK_HORECA_BASIC', 
          name: 'HORECA BASIC', 
          desc: 'Configuración esencial para hostelería: Inventario, APPCC y Facturación.',
          icon: 'bi-egg-fried',
          color: '#f59e0b',
          type: 'pack',
          feats: ['FEAT_CORE_DASHBOARD', 'FEAT_CORE_CLIENTS', 'FEAT_CORE_INVOICING', 'FEAT_SEDES', 'MOD_HORECA']
        },
        { 
          id: 'PACK_TREASURY_PRO', 
          name: 'TESORERÍA PRO', 
          desc: 'Control total de liquidez: SEPA, Conciliación y Extractos.',
          icon: 'bi-bank',
          color: '#3b82f6',
          type: 'pack',
          feats: ['FEAT_DOC_COBRO', 'FEAT_SEPA_COBRO', 'FEAT_DOC_PAGO', 'FEAT_SEPA_PAGO', 'FEAT_CONCILIACION', 'FEAT_LIBRO_MAYOR', 'FEAT_SUBSCRIPTIONS']
        }
      ];
    }
    this.logUnifiedControlDeployment();
  },

  logUnifiedControlDeployment: function() {
    console.log("Titanium License Control: Unified Deployment Verified.");
  },



  editPack: function(packId) {
    const p = this.packs.find(x => x.id === packId);
    if (!p) return;

    const label = p.type === 'base' ? 'Plan' : 'Pack';
    const overlay = document.createElement('div');
    overlay.className = 'h-modal-overlay animate-slide';
    overlay.innerHTML = `
      <div class="h-modal shadow-lg" style="width: 800px; max-height: 90vh;">
         <div class="h-modal-header bg-dark text-white d-flex justify-content-between align-items-center">
            <h5 class="m-0 fw-black text-uppercase">Configurar ${label}: ${p.name}</h5>
            <button class="btn-close btn-close-white" onclick="this.closest('.h-modal-overlay').remove()"></button>
         </div>
         <div class="h-modal-body bg-light p-4 overflow-hidden d-flex flex-column" style="max-height: calc(90vh - 150px);">
            <div class="row g-3 mb-4 flex-shrink-0">
               <div class="col-md-6">
                  <label class="h-label-refined">Nombre del ${label}</label>
                  <input type="text" id="edit-pack-name" class="form-control h-form-control fw-bold" value="${p.name}">
               </div>
               <div class="col-md-6">
                  <label class="h-label-refined">Buscador de Módulos</label>
                  <div class="input-group">
                     <span class="input-group-text bg-white border-end-0"><i class="bi bi-search"></i></span>
                     <input type="text" id="pack-feat-search" class="form-control h-form-control border-start-0" placeholder="Buscar función..." oninput="LicenseControlView.filterPackFeatures()">
                  </div>
               </div>
               <div class="col-md-12">
                  <label class="h-label-refined">Descripción</label>
                  <textarea id="edit-pack-desc" class="form-control" rows="1">${p.desc}</textarea>
               </div>
            </div>
            
            <div id="pack-features-list" class="overflow-auto flex-grow-1 pe-2">
               <!-- Se renderiza dinámicamente -->
            </div>
         </div>
         <div class="h-modal-footer d-flex gap-2">
            <button class="btn btn-light border fw-bold flex-grow-1" onclick="this.closest('.h-modal-overlay').remove()">CANCELAR</button>
            <button class="t-btn-primary shadow" onclick="LicenseControlView.savePack('${p.id}')">GUARDAR CONFIGURACIÓN</button>
         </div>
      </div>`;
    document.body.appendChild(overlay);
    this.renderPackFeatures(p.feats);
  },

  filterPackFeatures: function() {
    const search = document.getElementById('pack-feat-search').value.toLowerCase();
    const checks = document.querySelectorAll('.pack-feat-check');
    const selectedIds = Array.from(checks).filter(c => c.checked).map(c => c.value);
    this.renderPackFeatures(selectedIds, search);
  },

  renderPackFeatures: function(selectedIds, searchTerm = '') {
    const container = document.getElementById('pack-features-list');
    if (!container) return;

    const filtered = this.FEATURES_LIST.filter(f => 
      f.label.toLowerCase().includes(searchTerm) || 
      f.desc.toLowerCase().includes(searchTerm) ||
      f.cat.toLowerCase().includes(searchTerm)
    );

    // Sort categories to put VERTICALES at the top in the pack editor
    const cats = [...new Set(filtered.map(f => f.cat))].sort((a, b) => {
       if (a === 'VERTICALES') return -1;
       if (b === 'VERTICALES') return 1;
       return a.localeCompare(b);
    });
    
    container.innerHTML = cats.map(cat => `
      <div class="mb-4">
         <h6 class="fw-black text-uppercase mb-2 x-small ${cat === 'VERTICALES' ? 'text-brand' : 'text-muted'}" style="letter-spacing:1px">
            ${cat === 'VERTICALES' ? '<i class="bi bi-cpu-fill me-1"></i> MOTOR DE ESPECIALIZACIÓN' : cat}
         </h6>
         <div class="row g-2">
            ${filtered.filter(f => f.cat === cat).map(f => `
               <div class="col-md-6">
                  <div class="p-2 border rounded-3 ${cat === 'VERTICALES' ? 'bg-dark text-white border-dark' : 'bg-white'} d-flex align-items-center gap-2" style="cursor:pointer" onclick="const cb = this.querySelector('input'); cb.checked = !cb.checked;">
                     <input type="checkbox" class="form-check-input pack-feat-check" value="${f.id}" ${selectedIds.includes(f.id) ? 'checked' : ''} onclick="event.stopPropagation()">
                     <div class="small fw-bold text-uppercase" style="font-size:10px">${f.label}</div>
                  </div>
               </div>
            `).join('')}
         </div>
      </div>
    `).join('') || '<div class="text-center p-5 opacity-50 small fw-bold">No se encontraron módulos con ese criterio.</div>';
  },

  savePack: function(packId) {
    const p = this.packs.find(x => x.id === packId);
    if (!p) return;

    p.name = document.getElementById('edit-pack-name').value;
    p.desc = document.getElementById('edit-pack-desc').value;
    p.feats = Array.from(document.querySelectorAll('.pack-feat-check:checked')).map(cb => cb.value);

    document.querySelector('.h-modal-overlay').remove();
    this.renderAll();
    HandooApp.ui.showToast("Configuración del pack actualizada localmente. Recuerde Aplicar Cambios para persistir.");
  },

  applyPack: function(packId) {
    const p = this.packs.find(x => x.id === packId);
    if (!p) return;
    
    const feats = p.feats;
    if (!feats) return;

    if (p.tier) {
      this.currentLicense.tier = p.tier;
      this.currentLicense.active_modules = [...feats];
    } else {
      feats.forEach(f => {
        if (!this.currentLicense.active_modules.includes(f)) {
          this.currentLicense.active_modules.push(f);
        }
      });
    }

    HandooApp.ui.showToast(`${p.tier ? 'Plan' : 'Pack'} ${p.name} aplicado con éxito.`);
    this.renderAll();
  },



  updatePaymentMethod: function(val) {
    this.currentLicense.payment_method = val;
    this.renderAll();
  },

  selectAll: function() {
    this.currentLicense.active_modules = this.FEATURES_LIST.map(f => f.id);
    HandooApp.ui.showToast("Todos los módulos seleccionados localmente. Pulse Aplicar para confirmar.", "info");
    this.renderAll();
  },

  toggleFeat: function(id) {
    const idx = this.currentLicense.active_modules.indexOf(id);
    const active = this.currentLicense.active_modules;
    
    if (idx > -1) {
      active.splice(idx, 1);
      // Desactivación en cascada (opcional, pero lógico)
      if (id === 'FEAT_DOC_COBRO') {
        ['FEAT_BATCH_COBRO', 'FEAT_SEPA_COBRO', 'FEAT_CALENDAR_COBRO'].forEach(dep => {
          const dIdx = active.indexOf(dep);
          if (dIdx > -1) active.splice(dIdx, 1);
        });
      }
      if (id === 'FEAT_DOC_PAGO') {
        ['FEAT_BATCH_PAGO', 'FEAT_SEPA_PAGO', 'FEAT_CALENDAR_PAGO'].forEach(dep => {
          const dIdx = active.indexOf(dep);
          if (dIdx > -1) active.splice(dIdx, 1);
        });
      }
    } else {
      active.push(id);
      // Activación en cascada (Dependencias)
      if (['FEAT_BATCH_COBRO', 'FEAT_SEPA_COBRO', 'FEAT_CALENDAR_COBRO'].includes(id)) {
        if (!active.includes('FEAT_DOC_COBRO')) active.push('FEAT_DOC_COBRO');
      }
      if (['FEAT_BATCH_PAGO', 'FEAT_SEPA_PAGO', 'FEAT_CALENDAR_PAGO'].includes(id)) {
        if (!active.includes('FEAT_DOC_PAGO')) active.push('FEAT_DOC_PAGO');
      }
      if (['FEAT_FIXED_ASSETS', 'FEAT_OPERATIONAL_TOOLS'].includes(id)) {
        if (!active.includes('FEAT_EXPENSE_NATURES')) active.push('FEAT_EXPENSE_NATURES');
      }
      if (['FEAT_ANALISIS_RIESGO', 'FEAT_PERFORMANCE', 'FEAT_MENU_ENGINEERING'].includes(id)) {
        if (!active.includes('FEAT_STRATEGY')) active.push('FEAT_STRATEGY');
      }
    }
    this.renderAll();
  },

  save: async function() {
    this.syncLocal();
    HandooApp.ui.setLoading('btn-save-license', true);
    await HandooApp.api('admin.save_settings', { 
      active_modules: this.currentLicense.active_modules, 
      subscription: this.currentLicense,
      custom_packs: this.packs
    });
    HandooApp.ui.showToast("Kernel Sincronizado. Aplicando cambios...", "success");
    
    // En lugar de reload completo que falla en GAS, reiniciamos la App suavemente
    setTimeout(async () => {
      HandooApp.ui.setLoading('btn-save-license', false);
      await HandooApp.init(true); // Recarga stats y sidebar forzando refresco
      HandooApp.navTo('Dashboard');
    }, 1500);
  }
};
</script>
