<!DOCTYPE html>
<html>
  <head>
    <style>
      body { font-family: 'Helvetica', 'Arial', sans-serif; padding: 40px; color: #1e293b; line-height: 1.3; font-size: 11px; }
      .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #333; padding-bottom: 10px; margin-bottom: 30px; }
      .logo img { height: 60px; max-width: 200px; }
      .company-info { text-align: right; }
      .company-name { margin: 0; text-transform: uppercase; font-size: 18px; }
      .subtitle { margin: 0; font-size: 12px; color: #666; }
      table { width: 100%; border-collapse: collapse; }
      th { background: #f8fafc; text-align: left; padding: 12px; text-transform: uppercase; font-size: 11px; color: #64748b; }
      td { border-bottom: 1px solid #f1f5f9; padding: 10px 8px; font-size: 11px; }
    </style>
  </head>
  <body>
    <div class="header">
      <div>
        <? if (companyLogo) { ?>
          <img src="<?= companyLogo ?>" style="height: 60px; max-width: 200px;">
        <? } ?>
      </div>
      <div class="company-info">
        <h2 class="company-name"><?= companyName ?></h2>
        <p class="subtitle">CARTA DE ALÉRGENOS ACTUALIZADA</p>
      </div>
    </div>
    <table>
      <thead>
        <tr>
          <th>NOMBRE DEL PRODUCTO / PLATO</th>
          <th>ALÉRGENOS PRESENTES</th>
        </tr>
      </thead>
      <tbody>
        <? for (var i = 0; i < items.length; i++) { 
           var p = items[i];
        ?>
          <tr style="border-bottom: 1px solid #eee;">
            <td style="padding: 12px; font-weight: bold; text-transform: uppercase; font-size: 13px;"><?= p.nombre ?></td>
            <td style="padding: 12px;">
              <? if (p.alergenos && p.alergenos.length > 0) { ?>
                <?= p.alergenos.join(', ') ?>
              <? } else { ?>
                <span style="color:#ccc; font-size:11px;">SIN ALÉRGENOS</span>
              <? } ?>
            </td>
          </tr>
        <? } ?>
      </tbody>
    </table>
  </body>
</html>
