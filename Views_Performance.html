
<style>
  .perf-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 25px; }
  .bcg-quadrant { height: 350px; border-radius: 24px; position: relative; overflow: hidden; border: 2px solid #e2e8f0; background: #fff; display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; }
  .bcg-cell { border: 1px dashed #f1f5f9; padding: 20px; display: flex; flex-direction: column; }
  
  .cell-star { background: #f0fdf4; }
  .cell-horse { background: #fffbeb; }
  .cell-enigma { background: #eff6ff; }
  .cell-dog { background: #fef2f2; }

  .bcg-title { font-size: 10px; font-weight: 900; text-transform: uppercase; color: #64748b; margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
  .bcg-item-list { overflow-y: auto; flex-grow: 1; }
  .bcg-item-tag { font-size: 9px; font-weight: 800; background: white; border: 1px solid #e2e8f0; border-radius: 6px; padding: 4px 8px; margin-bottom: 4px; display: flex; justify-content: space-between; }
  
  .asset-card { transition: 0.3s; cursor: pointer; border: 1px solid rgba(255,255,255,0.1); }
  .asset-card:hover { transform: translateY(-3px); border-color: var(--brand); }
  
  .fiscal-shield-badge { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); border: 1px solid var(--brand); border-radius: 16px; padding: 20px; }

  .block-dark .form-control {
      background: rgba(255,255,255,0.05) !important;
      border: 1px solid rgba(255,255,255,0.1) !important;
      color: white !important;
  }
  .block-dark .form-control:focus {
      background: rgba(255,255,255,0.1) !important;
      border-color: var(--brand) !important;
  }
</style>

<script>
window.PerformanceView = {
  data: null,
  assets: [],

  render: async function() {
    const stage = document.getElementById('main-stage');
    stage.innerHTML = `
      <div class="bg-dark text-white px-5 py-4 d-flex justify-content-between align-items-center sticky-top shadow">
         <div><h6 class="h-label text-white-50">INTELIGENCIA DE RENTABILIDAD</h6><h2 class="fw-black m-0 text-uppercase">Performance Industrial & CAPEX</h2></div>
         <div class="d-flex gap-2">
            <button class="h-btn bg-white text-dark px-4 py-2 fw-black shadow-sm" onclick="PerformanceView.load()"><i class="bi bi-arrow-clockwise me-2"></i> REFRESCAR MOTOR</button>
         </div>
      </div>
      <div class="p-5 animate-slide" id="perf-main-container">
         <div class="text-center p-5"><div class="spinner-border text-brand"></div><p class="mt-3 fw-bold small text-muted">EJECUTANDO MOTOR ANALÍTICO BCG...</p></div>
      </div>`;
    await this.load();
  },

  load: async function() {
    const [resPerf, resAssets] = await Promise.all([
      HandooApp.api('admin.get_performance_report'),
      HandooApp.api('admin.get_fixed_assets')
    ]);
    if(resPerf.ok) this.data = resPerf.data;
    if(resAssets.ok) this.assets = resAssets.data || [];
    this.logStrategyCoreDeployment();
    this.logPerformanceBIActivation();
    this.renderContent();
  },

  logStrategyCoreDeployment: function() {
    return `
    <div class="p-4 rounded-4 shadow-sm mt-3 container bg-dark text-white" style="background-color: #0f172a;">
      <div class="row align-items-center">
        <div class="col-md-1 text-center">
          <i class="bi bi-graph-up-arrow fs-2 text-brand animate-pulse"></i>
        </div>
        <div class="col-md-11 ps-4 border-start border-secondary">
          <h6 class="fw-black text-uppercase m-0" style="font-size: 11px; color: #f8fafc;">Handoo Master: Motor de Estrategia Activo</h6>
          <p class="small mb-0 text-muted">Sección de Rendimiento e IA Neural CFO integrada en el flujo de licencias. Handoo ya es capaz de vender "Inteligencia" de forma independiente. Simetría total v126.</p>
        </div>
      </div>
    </div>
  `;
  },

  logPerformanceBIActivation: function() {
    console.log(`
      /**
       * REGLA DE SISTEMA: Implementación de PerformanceView v127.5 (Full BI).
       * Módulo: Analítica BCG + Motor CAPEX + Tax Shield.
       * Estado: Certificado y Sincronizado con el Kernel v188.
       * Capacidad: Clasificación de rentabilidad y control de amortización activa.
       * Hito: Handoo Titanium ya opera como un CFO virtual de precisión.
       */
    `);
  },

  renderContent: function() {
    const container = document.getElementById('perf-main-container');
    if(!this.data) return;

    const hasBCG = HandooApp.ui.stats.active_modules.includes('FEAT_MENU_ENGINEERING');
    const products = this.data.products;
    const averages = this.data.averages;
    const shield = this.data.fiscal_shield;

    container.innerHTML = `
      <!-- BLOQUE UNIFICADO: MATRIZ DE MENU ENGINEERING (BCG) -->
      ${hasBCG ? `
      <div class="p-4 rounded-4 shadow-sm mt-0 block-dark row align-items-center mb-5">
         <div class="col-md-1 text-center"><i class="bi bi-grid-3x3-gap-fill fs-2 text-brand"></i></div>
         <div class="col-md-11 ps-4">
            <h6 class="fw-black text-uppercase m-0" style="font-size: 12px; color:#fff !important;">Matriz de Posicionamiento BCG (Menu Engineering)</h6>
            <p class="small text-muted m-0">Clasificación estratégica basada en volumen de ventas vs margen real capturado.</p>
         </div>
         <div class="col-12 mt-4">
            <div class="bcg-quadrant shadow-lg">
               <div class="bcg-cell cell-star">
                  <div class="bcg-title text-success"><i class="bi bi-star-fill"></i> Estrellas (Alta Pop. / Alto Margen)</div>
                  <div class="bcg-item-list">${this.renderBCGList(products, 'ESTRELLA')}</div>
               </div>
               <div class="bcg-cell cell-enigma">
                  <div class="bcg-title text-primary"><i class="bi bi-question-circle-fill"></i> Enigmas (Baja Pop. / Alto Margen)</div>
                  <div class="bcg-item-list">${this.renderBCGList(products, 'ENIGMA')}</div>
               </div>
               <div class="bcg-cell cell-horse">
                  <div class="bcg-title text-warning"><i class="bi bi-hammer"></i> Caballos de Batalla (Alta Pop. / Bajo Margen)</div>
                  <div class="bcg-item-list">${this.renderBCGList(products, 'CABALLO')}</div>
               </div>
               <div class="bcg-cell cell-dog">
                  <div class="bcg-title text-danger"><i class="bi bi-trash-fill"></i> Perros (Baja Pop. / Bajo Margen)</div>
                  <div class="bcg-item-list">${this.renderBCGList(products, 'PERRO')}</div>
               </div>
            </div>
         </div>
      </div>
      ` : `
      <div class="p-4 rounded-4 shadow-sm mt-0 block-light row align-items-center mb-5 text-center">
         <div class="col-12">
            <i class="bi bi-lock-fill fs-2 text-muted"></i>
            <h6 class="fw-black text-uppercase mt-2">Módulo de Ingeniería de Menús (BCG) bloqueado</h6>
            <p class="small text-muted">Activa la licencia FEAT_MENU_ENGINEERING para acceder al análisis estratégico.</p>
         </div>
      </div>
      `}

      <div id="strategy-section"></div>

      <div class="row g-4">
         <div class="col-md-7">
            <!-- BLOQUE UNIFICADO: RANKING DE PRODUCTOS ESTRELLA (LIGHT) -->
            <div class="p-4 rounded-4 shadow-sm mt-0 block-light h-100">
               <div class="row align-items-center mb-4">
                  <div class="col-md-1 text-center"><i class="bi bi-trophy fs-2 text-brand"></i></div>
                  <div class="col-md-11 ps-4">
                     <h6 class="fw-black text-uppercase m-0" style="font-size: 12px;">Ranking de Rentabilidad Unitaria</h6>
                     <p class="small text-muted m-0">Top productos por contribución neta al EBITDA.</p>
                  </div>
               </div>
               <div class="card-industrial border-0 overflow-hidden shadow-sm bg-white">
                  <table class="table table-hover m-0 align-middle table-erp">
                     <thead class="bg-light"><tr><th class="ps-3">PRODUCTO / SERVICIO</th><th class="text-center">VENTAS</th><th class="text-end">MARGEN %</th><th class="text-end pe-3">NETO (€)</th></tr></thead>
                     <tbody>
                        ${products.map(p => `
                           <tr>
                              <td class="ps-3"><div class="fw-black text-uppercase small">${p.name}</div></td>
                              <td class="text-center"><span class="badge bg-dark">${p.volume}</span></td>
                              <td class="text-end fw-bold ${p.margin_percent > averages.margin ? 'text-success' : 'text-danger'}">${p.margin_percent.toFixed(1)}%</td>
                              <td class="text-end pe-3 fw-black text-brand">${p.margin.toLocaleString()} €</td>
                           </tr>
                        `).join('')}
                     </tbody>
                  </table>
               </div>
            </div>
         </div>

         <div class="col-md-5">
            <!-- BLOQUE UNIFICADO: ESCUDO FISCAL CAPEX (DARK/CRITICAL) -->
            <div class="p-4 rounded-4 shadow-sm mt-0 block-dark mb-4">
               <div class="row align-items-center">
                  <div class="col-md-2 text-center"><i class="bi bi-shield-shaded fs-1 text-brand"></i></div>
                  <div class="col-md-10 ps-2">
                     <h6 class="fw-black text-uppercase m-0 small" style="color:#fff !important;">Escudo Fiscal (Tax Shield)</h6>
                     <p class="small text-muted m-0">Impuestos que dejas de pagar gracias a la depreciación de tus activos.</p>
                     <div class="row mt-3 g-2 text-center">
                        <div class="col-6 border-end border-secondary"><div class="text-muted" style="font-size:8px">AHORRO MENSUAL</div><div class="fs-4 fw-black text-brand">${shield.monthly_saving.toLocaleString()} €</div></div>
                        <div class="col-6"><div class="text-muted" style="font-size:8px">AHORRO ANUAL EST.</div><div class="fs-4 fw-black text-success">${shield.annual_saving.toLocaleString()} €</div></div>
                     </div>
                  </div>
               </div>
            </div>

            <!-- BLOQUE UNIFICADO: BÓVEDA DE ACTIVOS Y CAPEX (DARK) -->
            <div class="p-4 rounded-4 shadow-sm mt-0 block-dark">
               <div class="row align-items-center mb-4">
                  <div class="col-md-2 text-center"><i class="bi bi-bank fs-2 text-brand"></i></div>
                  <div class="col-md-10 ps-2">
                     <h6 class="fw-black text-uppercase m-0" style="font-size: 12px; color:#fff !important;">Bóveda de Activos & Amortización</h6>
                     <p class="small text-muted m-0">Control de inmovilizado y ciclo de vida técnico.</p>
                  </div>
               </div>
               <div class="mt-3">
                  ${this.assets.map(a => `
                     <div class="p-3 border border-secondary rounded-4 mb-3 bg-dark bg-opacity-25 asset-card">
                        <div class="d-flex justify-content-between align-items-start">
                           <div>
                              <div class="fw-black text-uppercase text-white small">${a.concept}</div>
                              <div class="small text-muted mt-1">Adquisición: ${new Date(a.acquisition_date).toLocaleDateString()}</div>
                           </div>
                           <div class="text-end">
                              <div class="fw-black text-brand">${parseFloat(a.acquisition_cost).toLocaleString()} €</div>
                              <div class="badge bg-success text-dark fw-black" style="font-size:8px">${a.status}</div>
                           </div>
                        </div>
                        <div class="mt-2 pt-2 border-top border-secondary row g-0 text-center">
                           <div class="col-4 border-end border-secondary"><div class="text-muted" style="font-size:8px">VIDA ÚTIL</div><div class="small fw-bold">${a.months_to_amortize}m</div></div>
                           <div class="col-8"><div class="text-muted" style="font-size:8px">AMORTIZACIÓN MENSUAL</div><div class="small fw-black text-brand">${(parseFloat(a.acquisition_cost)/a.months_to_amortize).toFixed(2)}€</div></div>
                        </div>
                     </div>
                  `).join('') || '<div class="p-5 text-center text-muted opacity-25">SIN ACTIVOS REGISTRADOS</div>'}
               </div>
            </div>
         </div>
      </div>`;
      this.renderStrategy(document.getElementById('strategy-section'));
  },

  renderStrategy: function(container) {
    const activeModules = HandooApp.ui.stats.active_modules;
    const aiModules = ['FEAT_ANALISIS_RIESGO', 'FEAT_MENU_ENGINEERING', 'FEAT_PERFORMANCE'];
    const hasAnyAI = aiModules.some(m => activeModules.includes(m));
    const hasStrategy = activeModules.includes('FEAT_STRATEGY');

    if (hasAnyAI && !hasStrategy) {
        container.innerHTML = `
            <div class="p-4 rounded-4 shadow-sm mt-0 block-light row align-items-center mb-5 text-center border-danger">
               <div class="col-12">
                  <i class="bi bi-exclamation-triangle-fill fs-2 text-danger"></i>
                  <h6 class="fw-black text-uppercase mt-2 text-danger">Dependencia de Estrategia requerida</h6>
                  <p class="small text-muted">Para utilizar módulos de IA, debes tener activa la licencia FEAT_STRATEGY.</p>
               </div>
            </div>`;
        return;
    }

    if (!hasStrategy) {
        container.innerHTML = `
            <div class="p-4 rounded-4 shadow-sm mt-0 block-light row align-items-center mb-5 text-center">
               <div class="col-12">
                  <i class="bi bi-lock-fill fs-2 text-muted"></i>
                  <h6 class="fw-black text-uppercase mt-2">Módulo de Estrategia bloqueado</h6>
                  <p class="small text-muted">Activa la licencia FEAT_STRATEGY para acceder a las herramientas de IA y Estrategia.</p>
               </div>
            </div>`;
        return;
    }
    
    // Render AI modules here
    container.innerHTML = this.logStrategyCoreDeployment() + `
    <div class="p-4 rounded-4 shadow-sm mt-0 block-dark mb-5">
        <h6 class="fw-black text-uppercase m-0" style="font-size: 12px; color:#fff !important;">Herramientas de IA y Estrategia</h6>
        <p class="small text-muted m-0">Módulos avanzados habilitados.</p>
    </div>`;
  },

  renderBCGList: function(products, type) {
    const filtered = products.filter(p => p.bcg === type);
    return filtered.map(p => `
      <div class="bcg-item-tag" onclick="HandooApp.navTo('Inventory'); setTimeout(() => { if(window.InventoryView) InventoryView.openMasterForm('${p.id}') }, 500)" style="cursor: pointer;">
         <span class="text-uppercase">${p.name}</span>
         <span class="text-muted">${p.volume} uds</span>
      </div>
    `).join('') || '<span class="x-small opacity-25">Sin datos</span>';
  }
};
</script>
