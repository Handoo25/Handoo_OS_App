<style>
  /* --- FRAMEWORK TITANIUM TREASURY V55.0 (EDA & MODULAR ARCHITECTURE) --- */
  .t-shell { display: flex; background: white; border: 1px solid var(--border); border-radius: 24px; overflow: hidden; min-height: 850px; box-shadow: 0 10px 40px rgba(0,0,0,0.05); }

  .nav-link-treasury { display: flex; align-items: center; gap: 12px; padding: 14px 20px; border: none; background: none; width: 100%; text-align: left; font-weight: 800; color: #64748b; transition: background 0.2s, color 0.2s; font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; cursor: pointer; border-radius: 12px; margin-bottom: 2px; }

  .table-erp { font-size: 11px !important; width: 100%; border-collapse: separate; border-spacing: 0; }

  .table-erp tr:not(.no-hover):hover td { background-color: #f8fafc; cursor: pointer; }

  .h-label-refined { font-size: 10px; font-weight: 800; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; display: block; }
  .h-form-control { height: 42px; border-radius: 12px; font-size: 13px; font-weight: 600; }
  
  .badge-status { padding: 5px 12px; border-radius: 8px; font-weight: 900; font-size: 9px; text-transform: uppercase; border: 1px solid transparent; }
  .badge-pendiente { background: #fff; color: #64748b; border: 1px solid #e2e8f0; }
  .badge-cobrado { background: #22c55e; color: #fff; }
  .badge-pagado { background: #3b82f6; color: #fff; }
  .badge-remesado { background: #f97316; color: #fff; }

  .t-batch-bar { background: #0f172a; color: white; border-radius: 16px; padding: 15px 30px; display: flex; align-items: center; justify-content: space-between; margin-bottom: 25px; border-left: 6px solid var(--brand); box-shadow: 0 15px 30px rgba(0,0,0,0.2); }
  .row-selected td { background: #fffdf5 !important; border-top: 1px solid var(--brand); border-bottom: 1px solid var(--brand); }

  /* LEDGER SPECIFIC CLASSES */
  .balance-badge { padding: 8px 15px; border-radius: 10px; font-weight: 900; font-size: 14px; display: inline-flex; align-items: center; gap: 8px; }

  .balance-negative { background: #fef2f2; color: #991b1b; border: 1px solid #fecaca; }

  .origin-manual { background: #f1f5f9; color: #475569; border-color: #cbd5e1; }
  .origin-invoice { background: #fffdf5; color: #92400e; border-color: #fde68a; }
  .origin-expense { background: #fef2f2; color: #991b1b; border-color: #fecaca; }

  .settlement-option { cursor: pointer; border: 2px solid transparent !important; transition: 0.2s; }
  .settlement-option:hover { border-color: #e2e8f0 !important; transform: scale(1.02); }
  .settlement-option.active { border-color: var(--brand) !important; background: #fffdf5 !important; }

  .split-input { border: 1px solid var(--brand); background: #fffdf5; border-radius: 6px; padding: 4px 8px; font-weight: 900; text-align: right; width: 100px; font-family: 'JetBrains Mono', monospace; }
  .wiz-section-header { background: #f8fafc; padding: 10px 20px; font-weight: 900; font-size: 10px; text-transform: uppercase; color: #64748b; letter-spacing: 1px; border-bottom: 1px solid #e2e8f0; }
  
  .compact-card { display: flex; align-items: stretch; border: 1px solid #e2e8f0; border-radius: 12px; margin-bottom: 10px; background: white; transition: 0.2s; overflow: hidden; }
  .compact-card:hover { border-color: var(--brand); transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05); }
  .compact-body { flex-grow: 1; padding: 15px 20px; display: flex; align-items: center; justify-content: space-between; }
  .compact-actions { width: 50px; background: #f8fafc; border-left: 1px solid #e2e8f0; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; }
  .compact-actions:hover { background: #fee2e2; color: #ef4444; }

  @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  @keyframes slideDown { from { transform: translateY(-20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

<script>
/**
 * 1. BUS DE EVENTOS (HANDOO EDA CORE)
 */

/**
 * 2. ESTADO GLOBAL SILENCIOSO
 */
window.selectedIds = new Set();

/**
 * 3. MÓDULOS DE LÓGICA DE NEGOCIO (INDEPENDIENTES)
 */

// --- MÓDULO DE TRIPLE CAJA ---
const TripleCajaModule = {
  init() {
    this.renderDashboard();
  },

  renderDashboard() {
    const container = document.getElementById('triple-caja-area');
    if (!container) return;
    
    // Obtener saldos reales para el arqueo
    const balances = TreasuryView.settings?.balances || {};
    const tpvBalance = parseFloat(balances['570000001'] || 0);

    container.innerHTML = `
      <div class="row g-3">
        <div class="col-md-4"><div class="p-4 rounded-4 shadow-sm block-dark"><i class="bi bi-calculator fs-2 text-brand"></i><h6 class="fw-black text-uppercase text-white-50 mt-2">TPV</h6><div class="fw-black text-white fs-3">${tpvBalance.toLocaleString()} €</div></div></div>
        <div class="col-md-4"><div class="p-4 rounded-4 shadow-sm block-dark"><i class="bi bi-safe2 fs-2 text-brand"></i><h6 class="fw-black text-uppercase text-white-50 mt-2">CAJA FUERTE</h6><div class="fw-black text-white fs-3">${parseFloat(balances['570000002'] || 0).toLocaleString()} €</div></div></div>
        <div class="col-md-4"><div class="p-4 rounded-4 shadow-sm block-dark"><i class="bi bi-truck fs-2 text-brand"></i><h6 class="fw-black text-uppercase text-white-50 mt-2">TRÁNSITO</h6><div class="fw-black text-white fs-3">${parseFloat(balances['570000003'] || 0).toLocaleString()} €</div></div></div>
      </div>
      <div class="mt-3 d-flex gap-2">
        <button class="btn btn-brand-titanium fw-black shadow" onclick="TripleCajaModule.openTransferModal()">TRASPASO INTERNO</button>
        <button class="btn btn-danger fw-black shadow" onclick="TripleCajaModule.openGastoCajaModal()">+ GASTO CAJA</button>
        <button class="btn btn-warning fw-black shadow" onclick="TripleCajaModule.openClosureModal(${tpvBalance})"><i class="bi bi-safe2 me-2"></i> REALIZAR ARQUEO / CIERRE</button>
      </div>
    `;
  },

  openGastoCajaModal() {
    const categories = TreasuryView.settings?.masters?.expense_categories || [];
    const overlay = document.createElement('div'); overlay.className = 'h-modal-overlay animate-slide';
    overlay.style.zIndex = '12000';
    overlay.innerHTML = `
      <div class="h-modal shadow-lg" style="width: 500px; background: #0f172a; color: white;">
         <div class="h-modal-header border-bottom border-secondary"><h5 class="m-0 fw-black text-uppercase">GASTO DIRECTO POR CAJA</h5></div>
         <div class="h-modal-body">
            <div class="unified-block block-dark mt-0">
               <label class="h-label-refined text-white-50">ORIGEN DEL DINERO</label>
               <select id="gc-origen" class="form-select h-form-control bg-dark border-secondary text-white fw-bold mb-3">
                  <option value="570000001">TPV (570000001)</option>
                  <option value="570000002">CAJA FUERTE (570000002)</option>
                  <option value="570000003">DINERO EN TRÁNSITO (570000003)</option>
               </select>
               <label class="h-label-refined text-white-50">IMPORTE (€)</label>
               <input type="number" step="0.01" id="gc-imp" class="form-control h-form-control bg-dark border-secondary text-brand fw-black mb-3" value="0.00">
               <label class="h-label-refined text-white-50">CATEGORÍA DE GASTO</label>
               <select id="gc-cat" class="form-select h-form-control bg-dark border-secondary text-white fw-bold mb-3">
                  ${categories.map(c => `<option value="${c.nombre}">${c.nombre}</option>`).join('')}
               </select>
               <label class="h-label-refined text-white-50">CONCEPTO</label>
               <input type="text" id="gc-concepto" class="form-control h-form-control bg-dark border-secondary text-white fw-bold" placeholder="Ej: Compra de limones urgente">
            </div>
         </div>
         <div class="h-modal-footer d-flex gap-2">
            <button class="btn btn-light border fw-bold flex-grow-1" onclick="this.closest('.h-modal-overlay').remove()">CANCELAR</button>
            <button id="btn-exec-gasto" class="btn btn-danger fw-black flex-grow-1 shadow" onclick="TripleCajaModule.executeGastoCaja()">REGISTRAR GASTO 💸</button>
         </div>
      </div>`;
    document.body.appendChild(overlay);
  },

  async executeGastoCaja() {
    const origen = document.getElementById('gc-origen').value;
    const p = {
      cuenta_origen: origen,
      importe: document.getElementById('gc-imp').value,
      categoria: document.getElementById('gc-cat').value,
      concepto: document.getElementById('gc-concepto').value,
      fecha: new Date().toISOString().split('T')[0]
    };
    
    // Si es Tránsito, vinculamos a la liquidación del día (asumiendo backend gestiona el ID de liquidación actual)
    if (origen === '570000003') {
        p.vinculo_liquidacion = 'DAILY_SETTLEMENT_CURRENT';
    }

    if (parseFloat(p.importe) <= 0) return HandooApp.ui.showToast("Importe no válido", "error");
    if (!p.concepto) return HandooApp.ui.showToast("Indique un concepto", "error");
    
    HandooApp.ui.setLoading('btn-exec-gasto', true);
    // Assuming treasury.create_manual_expense exists or similar
    const res = await HandooApp.api('treasury.create_manual_expense', p);
    if(res.ok) { 
      document.querySelector('.h-modal-overlay[style*="z-index: 12000"]').remove(); 
      await TreasuryView.load(); 
    } else {
      HandooApp.ui.setLoading('btn-exec-gasto', false);
    }
  },

  openClosureModal(tpvBalance) {
    this.renderClosureModal(tpvBalance);
  },

  async renderClosureModal(tpvBalance) {
    const journalRes = await HandooApp.api('treasury.get_daily_cash_journal');
    const movements = journalRes.ok ? journalRes.data.movements : [];
    const initialBalance = journalRes.ok ? journalRes.data.initial_balance : 0;
    
    const overlay = document.createElement('div');
    overlay.className = 'h-modal-overlay animate-slide';
    overlay.innerHTML = `
      <div class="h-modal shadow-lg" style="width: 700px">
         <div class="h-modal-header" style="background: #0f172a; color: white;"><h5 class="m-0 fw-black">CONCILIACIÓN Y CIERRE DE CAJA</h5></div>
         <div class="h-modal-body bg-light">
            <h6 class="fw-black text-uppercase mb-3">Validación de Movimientos</h6>
            <div style="max-height: 300px; overflow-y: auto;" class="mb-4">
              <table class="table table-erp">
                <thead><tr><th>VALIDAR</th><th>CONCEPTO</th><th>IMPORTE</th></tr></thead>
                <tbody id="c-movements-body">
                  ${movements.map(m => `
                    <tr>
                      <td><input type="checkbox" class="c-movement-check" data-id="${m.ref_id}" data-amount="${m.importe}" checked></td>
                      <td>${m.concepto}</td>
                      <td class="${m.importe >= 0 ? 'text-success' : 'text-danger'} fw-bold">${m.importe.toFixed(2)} €</td>
                    </tr>
                  `).join('')}
                </tbody>
              </table>
            </div>
            <h6 class="fw-black text-uppercase mb-3">Arqueo Físico</h6>
            <label class="h-label-refined">EFECTIVO REAL EN CAJÓN (€)</label>
            <input type="number" id="c-real" class="form-control mb-3 fw-black text-brand fs-4 text-center" placeholder="0.00" oninput="TripleCajaModule.calculateDifference(${initialBalance})">
            <div class="small text-muted mb-3">Saldo teórico calculado: <span class="fw-bold" id="c-teorico">${initialBalance.toFixed(2)} €</span></div>
            <div id="c-diff-badge" class="badge p-2 mb-3 w-100" style="display:none"></div>
            <label class="h-label-refined">OBSERVACIONES</label>
            <textarea id="c-obs" class="form-control" rows="2"></textarea>
         </div>
         <div class="h-modal-footer">
            <button class="btn btn-light" onclick="this.closest('.h-modal-overlay').remove()">CANCELAR</button>
            <button class="btn btn-dark" onclick="TripleCajaModule.executeClosure(${initialBalance})">CONFIRMAR CIERRE</button>
         </div>
      </div>`;
    document.body.appendChild(overlay);
    
    document.querySelectorAll('.c-movement-check').forEach(cb => cb.onchange = () => TripleCajaModule.calculateDifference(initialBalance));
    TripleCajaModule.calculateDifference(initialBalance);
  },

  calculateDifference(initialBalance) {
    const checked = Array.from(document.querySelectorAll('.c-movement-check:checked'));
    const sumChecked = checked.reduce((sum, cb) => sum + parseFloat(cb.dataset.amount), 0);
    const real = parseFloat(document.getElementById('c-real').value || 0);
    
    const theoretical = initialBalance + sumChecked;
    document.getElementById('c-teorico').innerText = theoretical.toFixed(2) + ' €';
    
    const diff = real - theoretical;
    const badge = document.getElementById('c-diff-badge');
    if (Math.abs(diff) > 0.01) {
        badge.style.display = 'block';
        badge.className = 'badge p-2 mb-3 w-100 bg-danger text-white';
        badge.innerText = `DIFERENCIA DE ARQUEO: ${diff.toFixed(2)} €`;
    } else {
        badge.style.display = 'none';
    }
  },

  async executeClosure(initialBalance) {
    const real = parseFloat(document.getElementById('c-real').value || 0);
    const checked = Array.from(document.querySelectorAll('.c-movement-check:checked'));
    const validatedIds = checked.map(cb => cb.dataset.id);
    
    const p = {
        tpv_real: real,
        saldo_teorico: initialBalance,
        validated_movement_ids: validatedIds,
        observaciones: document.getElementById('c-obs').value
    };
    
    const res = await HandooApp.api('treasury.execute_daily_closure', p);
    if(res.ok) {
        HandooApp.ui.showToast("Cierre diario procesado correctamente");
        document.querySelector('.h-modal-overlay').remove();
        this.renderDashboard();
    } else {
        HandooApp.ui.showToast(res.msg, "error");
    }
  },

  openTransferModal() {
    const overlay = document.createElement('div');
    overlay.className = 'h-modal-overlay animate-slide';
    overlay.innerHTML = `
      <div class="h-modal shadow-lg" style="width: 400px">
         <div class="h-modal-header bg-dark text-white"><h5 class="m-0 fw-black">TRASPASO INTERNO</h5></div>
         <div class="h-modal-body bg-light">
            <select id="t-from" class="form-select mb-2"><option value="TPV">TPV</option><option value="CAJA_FUERTE">CAJA FUERTE</option><option value="TRANSITO">TRÁNSITO</option></select>
            <select id="t-to" class="form-select mb-2"><option value="CAJA_FUERTE">CAJA FUERTE</option><option value="TPV">TPV</option><option value="TRANSITO">TRÁNSITO</option></select>
            <input type="number" id="t-amt" class="form-control mb-3" placeholder="Importe">
         </div>
         <div class="h-modal-footer">
            <button class="btn btn-light" onclick="this.closest('.h-modal-overlay').remove()">CANCELAR</button>
            <button class="btn btn-dark" onclick="TripleCajaModule.executeTransfer()">TRASPASAR</button>
         </div>
      </div>`;
    document.body.appendChild(overlay);
  },

  async executeTransfer() {
    const from = document.getElementById('t-from').value;
    const to = document.getElementById('t-to').value;
    const amt = document.getElementById('t-amt').value;
    const res = await HandooApp.api('treasury.internal_transfer', { from_id: from, to_id: to, importe: amt, fecha: new Date().toISOString().split('T')[0] });
    if(res.ok) {
       HandooApp.ui.showToast("Traspaso realizado");
       document.querySelector('.h-modal-overlay').remove();
       this.renderDashboard();
    } else {
       HandooApp.ui.showToast(res.msg, "error");
    }
  }
};

// --- MÓDULO DE MOVIMIENTOS BANCARIOS (LEDGER) ---
const LedgerModule = {
  init() {
    HandooEvents.on('ledgerQuery', () => this.fetchLedger());
  },

  /**
   * Ejecuta la consulta al Kernel con los filtros activos.
   */
  async fetchLedger() {
    const filters = TreasuryView.ledgerFilters;
    const area = document.getElementById('ledger-results-area');
    if(!area) return;

    area.innerHTML = `<div class="text-center p-5"><div class="spinner-border text-brand"></div><p class="mt-3 small fw-bold text-muted">Recuperando movimientos...</p></div>`;
    
    try {
      const res = await HandooApp.api('treasury.get_ledger', filters);
      if(res.ok) {
         TreasuryView.ledgerData = res.data;
         this.renderLedgerTable();
      } else {
         area.innerHTML = `<div class="p-5 text-center text-danger fw-black"><i class="bi bi-exclamation-octagon fs-2 mb-2"></i><br>${res.msg}</div>`;
      }
    } catch(e) {
      area.innerHTML = `<div class="p-5 text-center text-danger fw-black">Fallo crítico de comunicación con Kernel.</div>`;
    }
  },

  /**
   * Renderiza la tabla contable con saldos acumulados y rastro de origen.
   */
  renderLedgerTable() {
    const { movements, initial_balance } = TreasuryView.ledgerData || { movements: [], initial_balance: 0 };
    const area = document.getElementById('ledger-results-area');
    if(!area) return;
    
    area.innerHTML = `
      <div class="card border-0 shadow-sm rounded-4 overflow-hidden animate-slide">
         <div class="p-4 bg-light border-bottom d-flex justify-content-between align-items-center">
            <div><h6 class="fw-black text-uppercase m-0 small">Extracto de Operaciones Realizadas</h6><p class="small text-muted m-0">Movimientos contables detallados para auditoría.</p></div>
            <div class="balance-badge ${initial_balance >= 0 ? 'balance-positive' : 'balance-negative'}">
               <span class="small fw-bold" style="font-size:10px">SALDO INICIAL:</span>
               <span>${parseFloat(initial_balance).toLocaleString('es-ES', {minimumFractionDigits: 2})} €</span>
            </div>
         </div>
         <div class="table-responsive" style="max-height: 600px; overflow-y: auto;">
            <table class="table table-hover m-0 align-middle table-erp">
               <thead class="bg-white sticky-top shadow-sm">
                  <tr>
                     <th class="ps-4">FECHA</th>
                     <th>CONCEPTO</th>
                     <th class="text-center">ORIGEN</th>
                     <th class="text-end">CARGO (SALIDA)</th>
                     <th class="text-end">ABONO (ENTRADA)</th>
                     <th class="text-end pe-4">SALDO ACUM.</th>
                  </tr>
               </thead>
               <tbody id="ledger-body">
                  ${movements.map(m => `
                     <tr onclick="LedgerModule.goToLedgerOrigin('${m.ref_id}', '${m.origin}')" style="cursor:pointer" title="Haga clic para abrir documento origen">
                        <td class="ps-4 small text-muted font-monospace">${new Date(m.fecha).toLocaleDateString()}</td>
                        <td>
                           <div class="fw-bold text-dark text-uppercase" style="font-size:10px">${escapeHTML(m.concepto)}</div>
                           <div class="x-small text-muted font-monospace" style="font-size:8px">REF: ${m.ref_id}</div>
                        </td>
                        <td class="text-center">
                           <span class="movement-origin ${m.origin==='MANUAL'?'origin-manual':(m.origin==='INVOICE'?'origin-invoice':'origin-expense')}">
                              ${m.origin}
                           </span>
                        </td>
                        <td class="text-end fw-bold text-danger">${m.cargo > 0 ? '-' + m.cargo.toLocaleString('es-ES', {minimumFractionDigits: 2}) + ' €' : ''}</td>
                        <td class="text-end fw-bold text-success">${m.abono > 0 ? '+' + m.abono.toLocaleString('es-ES', {minimumFractionDigits: 2}) + ' €' : ''}</td>
                        <td class="text-end fw-black pe-4 ${m.saldo < 0 ? 'text-danger' : 'text-dark'}" style="font-size:12px">
                           ${parseFloat(m.saldo).toLocaleString('es-ES', {minimumFractionDigits: 2})} €
                        </td>
                     </tr>
                  `).join('') || '<tr><td colspan="6" class="p-5 text-center opacity-25 fw-black">SIN MOVIMIENTOS EN EL RANGO SELECCIONADO</td></tr>'}
               </tbody>
            </table>
         </div>
      </div>`;
  },

  async goToLedgerOrigin(refId, origin) {
    if(!refId || origin === 'MANUAL') return HandooApp.ui.showToast("Movimiento de ajuste interno sin documento vinculado.", "info");
    try {
      if(origin === 'INVOICE') {
         HandooApp.ui.showToast("Recuperando factura vinculada...", "info");
         await InvoicesView.openManualModal(refId);
      } else if(origin === 'EXPENSE') {
         HandooApp.ui.showToast("Recuperando gasto vinculado...", "info");
         await ExpensesView.openExpenseModal(refId);
      }
    } catch(e) {
      HandooApp.ui.showToast("No se pudo cargar el documento origen.", "error");
    }
  }
};

// --- MÓDULO DE COBROS Y PAGOS (RESTAURADO) ---
const CobrosModule = {
  init() {
    HandooEvents.on('openAudit', (id) => this.openOperationsSheet(id));
    HandooEvents.on('selectionChanged', () => this.refreshBatchBar());
  },

  refreshBatchBar() {
    const barContainer = document.getElementById('batch-bar-area');
    if (!barContainer) return;
    
    const active = TreasuryView.settings?.active_modules || [];
    const direction = TreasuryView.subTab === 'efectos' ? 'INBOUND' : 'OUTBOUND';
    const batchFeat = direction === 'INBOUND' ? 'FEAT_BATCH_COBRO' : 'FEAT_BATCH_PAGO';
    const hasBatch = active.includes(batchFeat);

    if (window.selectedIds.size > 0 && hasBatch) {
      const total = Array.from(window.selectedIds).reduce((s, id) => s + (parseFloat(TreasuryView.effects.find(e => String(e.id) === String(id))?.importe) || 0), 0);
      barContainer.innerHTML = `
        <div class="t-batch-bar">
           <div><h6 class="m-0 fw-black text-uppercase">${window.selectedIds.size} ELEMENTOS SELECCIONADOS</h6><p class="small m-0 opacity-50">Total bloque: ${total.toLocaleString()} €</p></div>
           <div class="d-flex gap-2">
              <button class="btn btn-sm btn-outline-light fw-bold px-4 border-0" id="btn-batch-cancel">CANCELAR</button>
              <button class="btn btn-sm btn-brand-titanium fw-black px-4 shadow" id="btn-batch-exec">LIQUIDAR BLOQUE ✅</button>
           </div>
        </div>`;
      
      document.getElementById('btn-batch-cancel').addEventListener('click', () => { window.selectedIds.clear(); HandooEvents.emit('selectionChanged'); TreasuryView.renderContent(); });
      document.getElementById('btn-batch-exec').addEventListener('click', () => this.openSettlementSelector(Array.from(window.selectedIds)));
    } else {
      barContainer.innerHTML = '';
    }
  },

  openOperationsSheet(id) {
    const e = TreasuryView.effects.find(x => String(x.id) === String(id));
    if(!e) return;
    const active = TreasuryView.settings?.active_modules || [];
    const direction = e.direction || 'INBOUND';
    const remesaFeat = direction === 'INBOUND' ? 'FEAT_SEPA_COBRO' : 'FEAT_SEPA_PAGO';
    const hasRemesas = active.includes(remesaFeat);
    const isSettled = ['COBRADO', 'PAGADO'].includes(e.status);
    const isReturned = e.status === 'DEVUELTO';
    const canRevert = isSettled || isReturned;

    const overlay = document.createElement('div');
    overlay.className = 'h-modal-overlay animate-slide';
    overlay.innerHTML = `
      <div class="h-modal shadow-lg" style="width: 750px">
         <div class="h-modal-header bg-dark text-white d-flex justify-content-between">
            <h5 class="m-0 fw-black text-uppercase">AUDITORÍA DE DOCUMENTO: ${e.invoice_id || e.id}</h5>
         </div>
         <div class="h-modal-body bg-light">
            <div class="unified-block block-dark mt-0">
               <div class="mb-4"><h6 class="h-label-refined text-white-50">TITULAR / TERCERO</h6><div class="fw-black text-white fs-5">${escapeHTML(e.client_name || e.entity_name || e.beneficiario)}</div></div>
               <div class="row g-3 align-items-end border-top border-secondary pt-3">
                  <div class="col-md-6"><label class="h-label-refined text-brand">VENCIMIENTO</label><input type="date" id="op-vto" class="form-control h-form-control bg-dark border-secondary text-white fw-bold" value="${String(e.vencimiento).split('T')[0]}" ${isSettled?'disabled':''}></div>
                  <div class="col-md-6 text-end"><label class="h-label-refined text-white-50">NOMINAL (€)</label><input type="number" step="0.01" id="op-imp" class="form-control h-form-control bg-dark border-secondary text-brand fw-black text-end fs-4" value="${parseFloat(e.importe).toFixed(2)}" ${isSettled?'disabled':''}></div>
               </div>
            </div>
            <div class="row g-3 mt-3">
               <div class="${hasRemesas ? 'col-md-4' : 'col-md-6'}"><button class="btn btn-success w-100 py-3 fw-black" ${isSettled?'disabled':''} onclick="CobrosModule.openSettlementSelector(['${e.id}'])">LIQUIDAR ✅</button></div>
               <div class="${hasRemesas ? 'col-md-4' : 'col-md-6'}"><button class="btn btn-warning w-100 py-3 fw-black" ${isSettled?'disabled':''} onclick="CobrosModule.uiOpenSplitAssistant('${e.id}')">FRACCIONAR (SPLIT)</button></div>
               ${hasRemesas ? `<div class="col-md-4"><button class="btn btn-danger w-100 py-3 fw-black" ${isSettled?'disabled':''} onclick="CobrosModule.uiReturnProtocol('${e.id}')">PROTOCOLO DEVOLUCIÓN</button></div>` : ''}
            </div>
            ${!isSettled ? `<div class="mt-3"><button class="btn btn-dark w-100 py-2 fw-bold" id="btn-save-op-meta">GUARDAR CAMBIOS EN DOCUMENTO 💾</button></div>` : ''}
            ${canRevert ? `<div class="mt-3"><button class="btn btn-outline-danger w-100 py-2 fw-bold" id="btn-undo-liq">REVERTIR OPERACIÓN CONTABLE ↩️</button></div>` : ''}
         </div>
         <div class="h-modal-footer d-flex gap-2">
            <button class="btn btn-light border fw-bold flex-grow-1" onclick="this.closest('.h-modal-overlay').remove()">CERRAR FICHA</button>
            <button class="btn btn-outline-danger fw-bold flex-grow-0 px-4" id="btn-del-eff"><i class="bi bi-trash"></i></button>
         </div>
      </div>`;
    document.body.appendChild(overlay);
    
    // Asegurar que el botón de cerrar funcione incluso si hay overlays anidados
    overlay.querySelector('button[onclick*="remove()"]').onclick = (ev) => {
       ev.stopPropagation();
       overlay.remove();
    };
    document.getElementById('btn-del-eff').addEventListener('click', () => this.deleteEffect(e.id));
    if(!isSettled) {
      document.getElementById('btn-save-op-meta').addEventListener('click', (ev) => this.executeSaveOpMeta(e.id, ev.currentTarget));
    }
    if(canRevert) {
      document.getElementById('btn-undo-liq').addEventListener('click', (ev) => this.executeUndoLiquidacion(e.id, ev.currentTarget));
    }
  },

  async executeSaveOpMeta(id, btnEl) {
    const vto = document.getElementById('op-vto').value;
    const imp = document.getElementById('op-imp').value;
    HandooApp.ui.setLoading(btnEl, true);
    try {
      const res = await HandooApp.api('treasury.update_effect', { id, vencimiento: vto, importe: imp });
      if(res.ok) {
         btnEl.closest('.h-modal-overlay').remove();
         await TreasuryView.load();
         HandooApp.ui.showToast("Documento actualizado", "success");
      } else {
         HandooApp.ui.showToast(res.msg || "Error al actualizar", "error");
         HandooApp.ui.setLoading(btnEl, false);
      }
    } catch (e) {
      HandooApp.ui.showToast("Error de red", "error");
      HandooApp.ui.setLoading(btnEl, false);
    }
  },

  async executeUndoLiquidacion(id, btnEl) {
    const msg = "¿DESHACER OPERACIÓN?";
    const sub = "El documento volverá a estado PENDIENTE y se ajustará el balance contable.";
    if(await HandooApp.ui.confirm(msg, sub)) {
       HandooApp.ui.setLoading(btnEl, true);
       try {
         const res = await HandooApp.api('treasury.update_effect', { 
           id, 
           status: 'PENDIENTE', 
           canal_pago: null, 
           fecha_cobro_real: null 
         });
         if(res.ok) { 
            btnEl.closest('.h-modal-overlay').remove(); 
            await TreasuryView.load(); 
            HandooApp.ui.showToast("Operación revertida con éxito", "success");
         } else {
            HandooApp.ui.showToast(res.msg || "Error al revertir la operación", "error");
            HandooApp.ui.setLoading(btnEl, false);
         }
       } catch (err) {
         HandooApp.ui.showToast("Fallo de comunicación con el servidor", "error");
         HandooApp.ui.setLoading(btnEl, false);
       }
    }
  },

  async deleteEffect(id) {
    if(await HandooApp.ui.confirm("¿ELIMINAR DOCUMENTO?")) {
      await HandooApp.api('treasury.delete_effect', {id});
      document.querySelector('.h-modal-overlay').remove();
      await TreasuryView.load();
    }
  },

  openSettlementSelector(ids) {
    const active = TreasuryView.settings?.active_modules || [];
    const isBatch = ids.length > 1;
    
    const firstEffect = TreasuryView.effects.find(e => String(e.id) === String(ids[0]));
    const direction = firstEffect?.direction || 'INBOUND';
    const showStripe = direction === 'INBOUND';
    const remesaFeat = direction === 'INBOUND' ? 'FEAT_SEPA_COBRO' : 'FEAT_SEPA_PAGO';
    const batchFeat = direction === 'INBOUND' ? 'FEAT_BATCH_COBRO' : 'FEAT_BATCH_PAGO';

    const totalSuma = ids.reduce((sum, id) => sum + (parseFloat(TreasuryView.effects.find(e => String(e.id) === String(id))?.importe) || 0), 0);
    const banks = TreasuryView.getOperativeBanks();
    const overlay = document.createElement('div');
    overlay.className = 'h-modal-overlay animate-slide'; overlay.id = 'settle-overlay';
    overlay.innerHTML = `
      <div class="h-modal shadow-lg" style="width: 600px">
         <div class="h-modal-header bg-success text-white"><h5 class="m-0 fw-black text-uppercase">LIQUIDACIÓN ${isBatch?'MÁSIVA':'INDIVIDUAL'}</h5></div>
         <div class="h-modal-body bg-light">
            <!-- Upsell Batch -->
            ${isBatch && !active.includes(batchFeat) ? `
               <div class="alert alert-warning border-0 shadow-sm rounded-4 p-4 mb-4">
                  <div class="d-flex align-items-center mb-2">
                     <i class="bi bi-lightning-charge-fill fs-3 me-3"></i>
                     <h6 class="fw-black m-0 text-uppercase">Función de Procesamiento Masivo</h6>
                  </div>
                  <p class="small m-0">Esta capacidad es exclusiva del Plan Industrial. Permite liquidar cientos de documentos en un solo clic.</p>
                  <button class="btn btn-warning btn-sm fw-black mt-3 px-4" onclick="HandooApp.navTo('LicenseControl')">ACTUALIZAR LICENCIA</button>
               </div>
            ` : ''}

            <!-- OPCIONES BÁSICAS: Siempre disponibles -->
            <div class="p-4 rounded-4 shadow-sm mt-3 block-light row align-items-center settlement-option" id="opt-cash">
               <div class="col-md-2 text-center"><i class="bi bi-cash-coin fs-2"></i></div>
               <div class="col-md-10"><h6 class="fw-black text-uppercase m-0">Efectivo / Caja (570)</h6><p class="small text-muted m-0">Registro inmediato en movimientos.</p></div>
            </div>
            
            <div class="p-4 rounded-4 shadow-sm mt-3 block-light row align-items-center settlement-option" id="opt-bank">
               <div class="col-md-2 text-center"><i class="bi bi-bank fs-2 text-brand"></i></div>
               <div class="col-md-10"><h6 class="fw-black text-uppercase m-0">Transferencia Bancaria</h6><p class="small text-muted m-0">Abono directo en cuenta comercial.</p></div>
            </div>

            <!-- OPCIONES PREMIUM: Con candado visual si no hay licencia -->
            <div class="p-4 rounded-4 shadow-sm mt-3 block-light row align-items-center settlement-option ${!active.includes('FEAT_CONCILIACION_STRIPE')?'opacity-50':''}" id="opt-stripe" style="${!showStripe ? 'display:none' : ''}">
               <div class="col-md-2 text-center"><i class="bi bi-stripe fs-2 text-primary"></i></div>
               <div class="col-md-10"><h6 class="fw-black text-uppercase m-0">Stripe / Pasarela ${!active.includes('FEAT_CONCILIACION_STRIPE')?'<i class="bi bi-lock-fill ms-2"></i>':''}</h6><p class="small text-muted m-0">Cobro automático mediante tarjeta.</p></div>
            </div>

            <div class="p-4 rounded-4 shadow-sm mt-3 block-dark row align-items-center settlement-option ${!active.includes(remesaFeat)?'opacity-50':''}" id="opt-remesa">
               <div class="col-md-2 text-center"><i class="bi bi-boxes fs-2 text-warning"></i></div>
               <div class="col-md-10"><h6 class="fw-black text-uppercase m-0 text-white">REMESAR (SEPA ISO 20022) ${!active.includes(remesaFeat)?'<i class="bi bi-lock-fill ms-2"></i>':''}</h6><p class="small text-muted m-0 text-white-50">Generar lote bancario de cobro/pago.</p></div>
            </div>

            <div id="bank-choice-area" class="mt-3 px-3" style="display:none">
               <label class="h-label-refined">BANCO DE ABONO / SALIDA</label>
               <select id="settle-bank-id" class="form-select h-form-control fw-bold">
                  ${banks.length > 0 ? banks.map(b=>`<option value="${b.nombre}">${b.nombre}</option>`).join('') : '<option value="">SIN BANCOS CONFIGURADOS</option>'}
               </select>
            </div>
            <div class="unified-block block-light mt-4">
               <label class="h-label-refined">IMPORTE TOTAL (SUMA ATÓMICA)</label>
               <input type="number" id="settle-amount" class="form-control h-form-control fw-black text-center fs-4" value="${totalSuma.toFixed(2)}">

            <button class="btn btn-light border fw-bold flex-grow-1" onclick="document.getElementById('settle-overlay').remove()">CANCELAR</button>

         </div>
      </div>`;

    let method = null;
    const btn = document.getElementById('btn-exec-liq');
    const cash = document.getElementById('opt-cash');
    const bank = document.getElementById('opt-bank');
    const stripe = document.getElementById('opt-stripe');
    const remesa = document.getElementById('opt-remesa');
    const bArea = document.getElementById('bank-choice-area');

    const checkLock = (feat, msg) => {
       if (!active.includes(feat)) {
          HandooApp.ui.confirm("Módulo Bloqueado", msg + " ¿Deseas ver los planes de precios?").then(ok => {
             if(ok) { 
                const overlay = document.getElementById('settle-overlay');
                if(overlay) overlay.remove(); 
                HandooApp.navTo('LicenseControl'); 
             }
          });
          return true;
       }
       return false;
    };

    cash.onclick = () => { method='CAJA'; cash.classList.add('active'); bank.classList.remove('active'); remesa.classList.remove('active'); stripe.classList.remove('active'); bArea.style.display='none'; btn.disabled=false; };
    bank.onclick = () => { method='BANCO'; bank.classList.add('active'); cash.classList.remove('active'); remesa.classList.remove('active'); stripe.classList.remove('active'); bArea.style.display='block'; btn.disabled=false; };
    
    stripe.onclick = () => { 
       method='STRIPE'; stripe.classList.add('active'); cash.classList.remove('active'); remesa.classList.remove('active'); bank.classList.remove('active'); bArea.style.display='none'; btn.disabled=false; 
    };
    
    remesa.onclick = () => { 
       method='REMESA'; remesa.classList.add('active'); bank.classList.remove('active'); cash.classList.remove('active'); stripe.classList.remove('active'); bArea.style.display='none'; btn.disabled=false; 
    };
    
    btn.onclick = async () => {
      if (isBatch && !active.includes(batchFeat)) {
         HandooApp.ui.showToast("Tu licencia actual no permite procesamiento por lotes.", "error");
         return;

      if (method === 'STRIPE' && !active.includes('FEAT_CONCILIACION_STRIPE')) {
         checkLock('FEAT_CONCILIACION_STRIPE', "La conexión con Stripe requiere el módulo de Pasarela Activo.");
         return;
      }
      if (method === 'REMESA') {
         document.getElementById('settle-overlay').remove();
         RemesasModule.openRemittanceWizard(ids[0], true);
         return;
      }
      HandooApp.ui.setLoading('btn-exec-liq', true);
      const res = await HandooApp.api('treasury.process_liquidacion', { effect_ids: ids, action: 'COBRAR', canal_pago: method === 'CAJA' ? 'CAJA' : (method === 'STRIPE' ? 'STRIPE' : document.getElementById('settle-bank-id').value), importe_real: parseFloat(document.getElementById('settle-amount').value) });
      if(res.ok) { document.getElementById('settle-overlay').remove(); window.selectedIds.clear(); await TreasuryView.load(); }
    };
  },

  uiOpenSplitAssistant(id) {
    const e = TreasuryView.effects.find(x => String(x.id) === String(id));
    const overlay = document.createElement('div');
    overlay.className = 'h-modal-overlay animate-slide'; overlay.style.zIndex = '11000'; overlay.id = 'split-overlay';
    const total = parseFloat(e.importe);
    overlay.innerHTML = `
      <div class="h-modal shadow-lg" style="width: 850px; height: 80vh">
         <div class="h-modal-header bg-dark text-white d-flex justify-content-between align-items-center"><h5 class="m-0 fw-black text-uppercase">PLAN DE FRACCIONAMIENTO (SPLIT)</h5></div>
         <div class="h-modal-body bg-light">
            <div class="unified-block block-dark mt-0">
               <div class="row g-3 align-items-end">
                  <div class="col-md-4"><label class="h-label-refined text-white-50">Nº FRACCIONES</label><input type="number" id="split-parts" class="form-control h-form-control fw-black" value="12" min="2"></div>
                  <div class="col-md-4"><label class="h-label-refined text-white-50">DIFERENCIAL (DÍAS)</label><input type="number" id="split-gap" class="form-control h-form-control fw-black" value="30"></div>
                  <div class="col-md-4 text-center"><div class="h-label text-white-50">NOMINAL A DIVIDIR</div><h3 class="fw-black text-white m-0">${total.toLocaleString()} €</h3></div>
               </div>
            </div>
            <div class="card-industrial mt-4 border-0 overflow-hidden shadow-sm bg-white">
               <div style="max-height: 350px; overflow-y: auto;"><table class="table table-hover table-erp m-0"><thead class="bg-light"><tr><th>ORDEN</th><th>VENCIMIENTO</th><th class="text-end">IMPORTE (€)</th></tr></thead><tbody id="split-body"></tbody></table></div>
               <div id="split-sum-bar" class="p-3 bg-light border-top text-end fw-black small">Suma Validada: 0,00 €</div>
            </div>
         </div>
         <div class="h-modal-footer d-flex gap-2">
            <button id="btn-exec-split" class="btn btn-dark fw-black flex-grow-1 shadow" disabled>GENERAR VENCIMIENTOS</button>
            <button class="btn btn-light border fw-bold flex-grow-1" onclick="document.getElementById('split-overlay').remove()">CANCELAR</button>
         </div>
      </div>`;
    document.body.appendChild(overlay);

    const updatePreview = () => {
      const parts = parseInt(document.getElementById('split-parts').value) || 1;
      const gap = parseInt(document.getElementById('split-gap').value) || 30;
      const partAmt = Math.floor((total / parts) * 100) / 100;
      const lastPartAmt = parseFloat((total - (partAmt * (parts - 1))).toFixed(2));
      let html = ''; const base = new Date(e.vencimiento);
      for(let i=0; i<parts; i++) {
        const d = new Date(base); d.setDate(d.getDate() + (i * gap));
        const val = (i === parts - 1) ? lastPartAmt : partAmt;
        html += `<tr><td>${i+1}/${parts}</td><td>${d.toLocaleDateString()}</td><td class="text-end"><input type="number" step="0.01" class="split-input wiz-input-inline text-end fw-black" value="${val}"> €</td></tr>`;
      }
      document.getElementById('split-body').innerHTML = html;
      document.querySelectorAll('.split-input').forEach(inp => inp.oninput = validateSum);
      validateSum();
    };

    const validateSum = () => {
      const inputs = document.querySelectorAll('.split-input');
      let sum = 0; inputs.forEach(i => sum += parseFloat(i.value || 0));
      const diff = Math.abs(sum - total);
      const bar = document.getElementById('split-sum-bar');
      const btn = document.getElementById('btn-exec-split');
      bar.innerText = `Suma Validada: ${sum.toLocaleString('es-ES', {minimumFractionDigits:2})} €`;
      if(diff < 0.05) { bar.className = 'p-3 bg-light border-top text-end fw-black small text-success'; btn.disabled = false; }
      else { bar.className = 'p-3 bg-light border-top text-end fw-black small text-danger'; btn.disabled = true; }
    };

    document.getElementById('split-parts').onchange = updatePreview;
    document.getElementById('split-gap').onchange = updatePreview;
    document.getElementById('btn-exec-split').onclick = async () => {
       const frs = Array.from(document.querySelectorAll('.split-input')).map((inp, idx) => {
          const d = new Date(e.vencimiento); d.setDate(d.getDate() + (idx * parseInt(document.getElementById('split-gap').value)));
          return { vencimiento: d.toISOString().split('T')[0], importe: parseFloat(inp.value) };
       });
       await HandooApp.api('treasury.split_effect', { parent_id: e.id, fractions: frs });
       document.getElementById('split-overlay').remove(); document.querySelector('.h-modal-overlay').remove(); await TreasuryView.load();
    };
    updatePreview();
  },

  uiReturnProtocol(id) {
    const overlay = document.createElement('div'); overlay.className = 'h-modal-overlay animate-slide'; overlay.id = 'ret-overlay'; overlay.style.zIndex='12000';
    overlay.innerHTML = `<div class="h-modal shadow-lg" style="width: 450px"><div class="h-modal-header bg-danger text-white"><h5 class="m-0 fw-black">INCIDENCIA DE IMPAGO (D-)</h5></div><div class="h-modal-body bg-light text-center"><i class="bi bi-shield-exclamation fs-1 text-danger"></i><h6 class="fw-black text-uppercase mt-2">Protocolo Devuelto</h6><p class="small text-muted">Se generará un nuevo efecto con prefijo D- y gastos.</p><label class="h-label-refined">GASTOS (€) - CTA 626</label><input type="number" id="ret-gastos" class="form-control h-form-control fw-black text-danger text-center" value="4.50"></div><div class="h-modal-footer d-flex gap-2"><button class="btn btn-danger fw-black flex-grow-1 shadow" id="btn-exec-ret">CONFIRMAR 🚨</button><button class="btn btn-light border fw-bold flex-grow-1" onclick="document.getElementById('ret-overlay').remove()">DESCARTAR</button></div></div>`;
    document.body.appendChild(overlay);
    document.getElementById('btn-exec-ret').onclick = async () => {
      await HandooApp.api('treasury.process_liquidacion', { effect_ids: [id], action: 'DEVOLVER', gastos: document.getElementById('ret-gastos').value });
      document.getElementById('ret-overlay').remove(); document.querySelector('.h-modal-overlay').remove(); await TreasuryView.load();
    };
  }
};

// --- MÓDULO DE REMESAS ---
const RemesasModule = {
  wizRem: { id: null, selectedIds: new Set(), overrides: {}, fecha_remesa: '', direction: 'INBOUND' },

  init() {
    HandooEvents.on('openRemittance', (id) => this.openRemittanceWizard(id));
  },

  openRemittanceWizard(remIdOrSeed = null, isSeed = false, direction = 'INBOUND') {
    this.wizRem = { id: null, selectedIds: new Set(), overrides: {}, fecha_remesa: new Date().toISOString().split('T')[0], direction: direction };
    if (isSeed) { 
      const e = TreasuryView.effects.find(x => String(x.id) === String(remIdOrSeed)); 
      if (e) { this.wizRem.selectedIds.add(String(e.id)); } 
    } 
    else if (remIdOrSeed) { 
      this.wizRem.id = String(remIdOrSeed); 
      const r = TreasuryView.remittances.find(x => String(x.id) === String(remIdOrSeed)); 
      if (r) { 
        this.wizRem.direction = r.direction || 'INBOUND'; 
        this.wizRem.fecha_remesa = r.fecha_remesa || r.created_at?.split('T')[0]; 
        TreasuryView.effects.filter(e => String(e.remittance_id) === String(remIdOrSeed)).forEach(e => this.wizRem.selectedIds.add(String(e.id))); 
      } 
    }
    this.renderWizModal();
  },

  renderWizModal() {
    const isEdit = !!this.wizRem.id;
    const r = isEdit ? TreasuryView.remittances.find(x => String(x.id) === String(this.wizRem.id)) : null;
    const status = r?.status || 'BORRADOR';
    const banks = TreasuryView.getOperativeBanks();
    const dir = this.wizRem.direction;
    const normas = dir === 'INBOUND' ? ['CORE (19)', 'B2B (58)'] : ['N34', 'CONFIRMING'];

    const overlay = document.createElement('div'); overlay.className = 'h-modal-overlay animate-slide';
    overlay.innerHTML = `
      <div class="h-modal shadow-lg" style="width: 1200px; height: 90vh;">
         <div class="h-modal-header bg-dark text-white d-flex justify-content-between align-items-center">
            <h5 class="m-0 fw-black text-uppercase">LOTE SEPA: ${dir} (${status})</h5>
         </div>
         <div class="h-modal-body bg-light p-0">
            <div class="p-4 block-dark border-bottom shadow-sm">
               <div class="row align-items-center">

  renderWizTables() {
    const linkedBody = document.getElementById('wiz-body-linked');
    const poolBody = document.getElementById('wiz-body-pool');
    const dir = this.wizRem.direction;
    const pool = TreasuryView.effects.filter(e => (e.direction || 'INBOUND') === dir && (String(e.remittance_id) === String(this.wizRem.id) || (e.status === 'PENDIENTE' && !e.remittance_id)));
    let linkedHtml = '', poolHtml = '', total = 0;

    pool.forEach(e => {
      const isSelected = this.wizRem.selectedIds.has(String(e.id));
      if(isSelected) {
        total += parseFloat(e.importe);
        linkedHtml += `<tr><td width="30" class="text-center"><i class="bi bi-check-circle-fill text-brand"></i></td><td><div class="fw-bold small text-uppercase">${escapeHTML(e.client_name || e.beneficiario)}</div></td><td class="font-monospace">${new Date(e.vencimiento).toLocaleDateString()}</td><td class="text-end fw-black">${parseFloat(e.importe).toLocaleString()}€</td><td class="text-end pe-3"><button class="btn btn-sm btn-outline-danger" onclick="RemesasModule.wizToggleSelect('${e.id}', false)"><i class="bi bi-x"></i></button></td></tr>`;

        poolHtml += `<tr onclick="RemesasModule.wizToggleSelect('${e.id}', true)" style="cursor:pointer"><td><i class="bi bi-circle text-muted"></i></td><td class="fw-bold small">${escapeHTML(e.client_name || e.beneficiario)}</td><td>${e.invoice_id || e.id}</td><td class="text-end fw-black">${parseFloat(e.importe).toLocaleString()}€</td><td class="text-end pe-3 font-monospace">${new Date(e.vencimiento).toLocaleDateString()}</td></tr>`;

  async executeSaveRem(action) {

  async executeUndoRemittance(id) { if(await HandooApp.ui.confirm("¿REVERTIR A BORRADOR?")) { await HandooApp.api('treasury.manage_remittance', { action: 'UPDATE', id, status: 'BORRADOR' }); await TreasuryView.load(); this.openRemittanceWizard(id); } },

  calculateAmortization() {
    const capital = parseFloat(document.getElementById('f-capital').value || 0);
    const interesAnual = parseFloat(document.getElementById('f-interes').value || 0) / 100;
    const plazoTotal = parseInt(document.getElementById('f-plazo').value || 12);
    const fechaIni = new Date(document.getElementById('f-primera').value || document.getElementById('f-firma').value);
    const carenciaMeses = parseInt(document.getElementById('f-meses-carencia').value || 0);
    const hasCarencia = document.getElementById('f-has-carencia').value === 'Sí';
    const tipoAmort = document.getElementById('f-tipo-amort').value;
    const interesMensual = interesAnual / 12;
    const plazoCapital = hasCarencia ? (plazoTotal - carenciaMeses) : plazoTotal;
    if (plazoCapital <= 0) return HandooApp.ui.showToast("Plazo total insuficiente.", "error");
    const cuotaFrancesa = (capital * interesMensual) / (1 - Math.pow(1 + interesMensual, -plazoCapital));
    let saldoPendiente = capital; const cuadro = [];
    for (let i = 1; i <= plazoTotal; i++) {
      let interesCuota = Math.round(saldoPendiente * interesMensual * 100) / 100;
      let capitalCuota = 0; let totalCuota = 0;
      if (hasCarencia && i <= carenciaMeses) { capitalCuota = 0; totalCuota = interesCuota; } else {
        if (tipoAmort === 'Lineal') { capitalCuota = Math.round((capital / plazoCapital) * 100) / 100; totalCuota = capitalCuota + interesCuota; } else { capitalCuota = Math.round((cuotaFrancesa - interesCuota) * 100) / 100; totalCuota = Math.round(cuotaFrancesa * 100) / 100; }
        if (i === plazoTotal) { capitalCuota = Math.round(saldoPendiente * 100) / 100; totalCuota = capitalCuota + interesCuota; }
        saldoPendiente -= capitalCuota;
      }
      const d = new Date(fechaIni); d.setMonth(d.getMonth() + (i - 1));
      cuadro.push({ vencimiento: d.toISOString().split('T')[0], capital_cuota: capitalCuota, interes_cuota: interesCuota, total_cuota: totalCuota, pagado: false });
      if (i === plazoTotal) document.getElementById('vto-final-label').innerText = `FIN: ${d.toLocaleDateString()}`;
    }
    this.tempCuadro = cuadro; this.refreshAmortTable();
  },

  renderAmortizationRows() { return this.tempCuadro.map((c, i) => `<tr onclick="FinanciacionModule.openInstallmentManager(${i})" style="cursor:pointer" class="${c.pagado ? 'bg-light opacity-75' : ''}"><td>${i+1}</td><td>${new Date(c.vencimiento).toLocaleDateString()}</td><td>${parseFloat(c.capital_cuota).toFixed(2)}€</td><td>${parseFloat(c.interes_cuota).toFixed(2)}€</td><td class="text-end fw-black">${parseFloat(c.total_cuota).toFixed(2)}€</td><td class="text-center"><span class="badge ${c.pagado ? 'bg-success' : 'bg-secondary'}" style="font-size:9px">${c.pagado ? 'PAGADO' : 'PEND.'}</span></td></tr>`).join('') || '<tr><td colspan="6" class="p-5 text-center opacity-25">SIN CUADRO CALCULADO</td></tr>'; },
  refreshAmortTable() { const body = document.getElementById('f-amort-body'); if(body) body.innerHTML = this.renderAmortizationRows(); },
  openInstallmentManager(idx) {
    const installment = this.tempCuadro[idx]; const today = new Date().toISOString().split('T')[0];
    const overlay = document.createElement('div'); overlay.className = 'h-modal-overlay animate-slide'; overlay.style.zIndex = '11000';
    overlay.innerHTML = `<div class="h-modal shadow-lg" style="width: 500px"><div class="h-modal-header bg-dark text-white"><h5 class="m-0 fw-black text-uppercase">CUOTA Nº ${idx+1}</h5></div><div class="h-modal-body bg-light"><div class="unified-block block-light mt-0"><div class="row g-2 text-center mb-3"><div class="col-6"><label class="h-label">NOMINAL</label><div class="fw-black fs-4">${parseFloat(installment.total_cuota).toFixed(2)}€</div></div><div class="col-6"><label class="h-label">VENCIMIENTO</label><div class="fw-bold">${new Date(installment.vencimiento).toLocaleDateString()}</div></div></div><div class="row g-3"><div class="col-md-12"><label class="h-label-refined">FECHA PAGO REAL</label><input type="date" id="inst-fecha-pago" class="form-control h-form-control fw-black" value="${installment.fecha_pago_real || today}" onchange="FinanciacionModule.recalcLateFees(${idx})"></div><div class="col-md-6"><label class="h-label-refined">GASTOS DEMORA (€)</label><input type="number" step="0.01" id="inst-late-fees" class="form-control h-form-control fw-black text-danger" value="${installment.gastos_demora || 0}"></div><div class="col-md-6"><label class="h-label-refined">TOTAL ABONADO</label><input type="number" step="0.01" id="inst-amount-paid" class="form-control h-form-control fw-black text-success" value="${parseFloat(installment.importe_real_pagado || installment.total_cuota).toFixed(2)}"></div></div><div class="mt-3"><div class="form-check form-switch"><input class="form-check-input" type="checkbox" id="inst-pagado-toggle" ${installment.pagado ? 'checked' : ''}><label class="form-check-label fw-bold small" for="inst-pagado-toggle">MARCAR COMO LIQUIDADA</label></div></div></div></div><div class="h-modal-footer"><button class="btn btn-light border fw-bold flex-grow-1" onclick="this.closest('.h-modal-overlay').remove()">CANCELAR</button><button class="btn btn-success fw-black flex-grow-1 shadow" onclick="FinanciacionModule.confirmInstallmentPayment(${idx})">CONFIRMAR</button></div></div>`;
    document.body.appendChild(overlay);
  },
  recalcLateFees(idx) { const inst = this.tempCuadro[idx]; const fPago = new Date(document.getElementById('inst-fecha-pago').value); const fVto = new Date(inst.vencimiento); if (fPago > fVto) { const diff = Math.ceil((fPago - fVto) / (1000 * 60 * 60 * 24)); document.getElementById('inst-late-fees').value = (diff * 0.75).toFixed(2); } else document.getElementById('inst-late-fees').value = 0; },
  confirmInstallmentPayment(idx) { const inst = this.tempCuadro[idx]; inst.pagado = document.getElementById('inst-pagado-toggle').checked; inst.fecha_pago_real = document.getElementById('inst-fecha-pago').value; inst.gastos_demora = parseFloat(document.getElementById('inst-late-fees').value || 0); inst.importe_real_pagado = parseFloat(document.getElementById('inst-amount-paid').value || 0); document.querySelector('.h-modal-overlay[style*="z-index: 11000"]').remove(); this.refreshAmortTable(); },
  openPartialCapitalAmortModal(loanId) {

  async executePartialAmortization() { const cant = parseFloat(document.getElementById('am-cantidad').value || 0); if (cant <= 0) return; if (await HandooApp.ui.confirm("¿AMORTIZAR?", `Se restarán ${cant}€ del capital.`)) { const currentCap = parseFloat(document.getElementById('f-capital').value || 0); document.getElementById('f-capital').value = (currentCap - cant).toFixed(2); this.calculateAmortization(); document.querySelector('.h-modal-overlay[style*="z-index: 11000"]').remove(); } },
  async executeSaveFinancing() {

      interes: document.getElementById('f-interes').value, 
      tipo_amortizacion: document.getElementById('f-tipo-amort').value,

      gastos_apertura: document.getElementById('f-apertura').value, 
      gastos_amort_parcial: document.getElementById('f-amort-parcial').value,

      fecha_primera: document.getElementById('f-primera').value,

const ConciliacionModule = {
  init() {
    HandooEvents.on('bankSelected', (id) => this.loadBankMovements(id));
  },
  async loadBankMovements(id) {
    HandooApp.ui.showToast("Recuperando extracto...", "info");
    const res = await HandooApp.api('treasury.get_bank_movements', { bank_account_id: id });
    if(res.ok) { TreasuryView.bankMovements = res.data; TreasuryView.renderContent(); }
  },
  async executeBulkAutonomousMatch() {
    if (await HandooApp.ui.confirm(`¿VALIDAR ${TreasuryView.autonomousMatches.length} CONCILIACIONES?`)) {
       const bank = TreasuryView.getOperativeBanks().find(b => String(b.id) === String(TreasuryView.selectedBankAccountId));
       const bankName = TreasuryView.selectedBankAccountId === 'INTERNAL_CAJA' ? 'CAJA CENTRAL' : (bank?.nombre || 'BANCO');
       for (const match of TreasuryView.autonomousMatches) { await HandooApp.api('treasury.match_reconciliation', { bank_movement_id: match.bank_mov_id, target_ids: [match.effect_id], bank_name: bankName }); }
       TreasuryView.autonomousMatches = []; await TreasuryView.load();
    }
  },
  async executeUndoMatch(movId) {
    if(await HandooApp.ui.confirm("¿REVERTIR CUADRE?")) {
       const res = await HandooApp.api('treasury.undo_match', { bank_movement_id: movId });
       if(res.ok) { await TreasuryView.load(); }
    }
  },

  openMatchingModal(movId) {
    const mov = TreasuryView.bankMovements.find(m => String(m.id) === String(movId));
    if(!mov) return;
    const pending = TreasuryView.effects.filter(e => e.status === 'PENDIENTE');
    const overlay = document.createElement('div'); overlay.className = 'h-modal-overlay animate-slide';
    overlay.innerHTML = `
      <div class="h-modal shadow-lg" style="width: 700px">
         <div class="h-modal-header bg-dark text-white"><h5 class="m-0 fw-black text-uppercase">CONCILIACIÓN DE MOVIMIENTO</h5></div>
         <div class="h-modal-body bg-light">
            <div class="unified-block block-dark mt-0 mb-3">
               <div class="row align-items-center">
                  <div class="col-md-8"><h6 class="h-label-refined text-white-50">CONCEPTO BANCARIO</h6><div class="fw-bold text-white">${mov.concepto}</div></div>
                  <div class="col-md-4 text-end"><h6 class="h-label-refined text-white-50">IMPORTE</h6><div class="fw-black text-brand fs-4">${parseFloat(mov.importe).toLocaleString()} €</div></div>
               </div>
            </div>
            <div class="wiz-section-header">SELECCIONE DOCUMENTOS A VINCULAR</div>
            <div class="card bg-white overflow-auto" style="max-height: 400px">
               <table class="table table-hover table-erp m-0">
                  <tbody>
                     ${pending.map(e => `
                        <tr onclick="ConciliacionModule.toggleMatchSelection(this, '${e.id}')" style="cursor:pointer">
                           <td width="30"><i class="bi bi-circle text-muted"></i></td>
                           <td><div class="fw-bold text-uppercase">${escapeHTML(e.client_name || e.entity_name)}</div><div class="small text-muted">${e.invoice_id || e.id}</div></td>
                           <td class="text-end fw-black">${parseFloat(e.importe).toLocaleString()} €</td>
                        </tr>`).join('') || '<tr><td class="p-4 text-center opacity-25">SIN DOCUMENTOS PENDIENTES</td></tr>'}
                  </tbody>
               </table>
            </div>
         </div>
         <div class="h-modal-footer d-flex gap-2">
            <button class="btn btn-light border fw-bold flex-grow-1" onclick="this.closest('.h-modal-overlay').remove()">CANCELAR</button>
            <button class="btn btn-sm btn-outline-brand fw-black" onclick="document.getElementById('matching-area').insertAdjacentHTML('afterend', ConciliacionModule_Extensions.renderQuickExpenseForm('${movId}'))">+ CREAR GASTO Y VINCULAR</button>
            <button id="btn-exec-match" class="btn btn-dark fw-black flex-grow-1 shadow" onclick="ConciliacionModule.executeMatch('${movId}')">CONCILIAR SELECCIÓN ✅</button>
         </div>
      </div>`;
    document.body.appendChild(overlay);
    this.selectedMatchIds = new Set();
  },

  toggleMatchSelection(tr, id) {
    const icon = tr.querySelector('i');
    if(this.selectedMatchIds.has(id)) {
       this.selectedMatchIds.delete(id);
       icon.className = 'bi bi-circle text-muted';
       tr.classList.remove('row-selected');
    } else {
       this.selectedMatchIds.add(id);
       icon.className = 'bi bi-check-circle-fill text-brand';
       tr.classList.add('row-selected');
    }
  },

  async executeMatch(movId) {
    if(this.selectedMatchIds.size === 0) return HandooApp.ui.showToast("Seleccione al menos un documento", "error");
    const bank = TreasuryView.getOperativeBanks().find(b => String(b.id) === String(TreasuryView.selectedBankAccountId));
    const bankName = TreasuryView.selectedBankAccountId === 'INTERNAL_CAJA' ? 'CAJA CENTRAL' : (bank?.nombre || 'BANCO');
    HandooApp.ui.setLoading('btn-exec-match', true);
    const res = await HandooApp.api('treasury.match_reconciliation', { bank_movement_id: movId, target_ids: Array.from(this.selectedMatchIds), bank_name: bankName });
    if(res.ok) { document.querySelector('.h-modal-overlay').remove(); await TreasuryView.load(); }
  },

  renderQuickExpenseFormInline: function(movId) {
    const row = document.getElementById(`mov-row-${movId}`);
    if (!row) return;
    
    // Check if already open
    if (document.getElementById(`quick-form-${movId}`)) {
      document.getElementById(`quick-form-${movId}`).remove();
      return;
    }
    
    const formHtml = ConciliacionModule_Extensions.renderQuickExpenseForm(movId);
    const newRow = document.createElement('tr');
    newRow.id = `quick-form-${movId}`;
    newRow.innerHTML = `<td colspan="4" class="p-0">${formHtml}</td>`;
    
    row.after(newRow);
  }
};

      concept: document.getElementById(`qe-concept-${movId}`).value,

        ${items.map(it => `<button class="nav-link-treasury ${this.subTab===it.id?'active':''}" onclick="TreasuryView.setSubTab('${it.id}')"><i class="bi ${it.icon}"></i> ${it.label}</button>`).join('')}</div>`;

  },

  setSubTab(tab) { this.subTab = tab; window.selectedIds.clear(); this.renderSidebar(); this.renderContent(); },

  renderContent() {
    const container = document.getElementById('treasury-content-main');
    if (!container) return;
    if (this.subTab === 'caja_operativa') this.renderCajaOperativa(container);
    else if (this.subTab === 'efectos') this.renderEfectos(container, 'INBOUND');
    else if (this.subTab === 'pagos') this.renderEfectos(container, 'OUTBOUND');
    else if (this.subTab === 'remesas') this.renderRemesas(container, 'INBOUND');
    else if (this.subTab === 'remesas_pago') this.renderRemesas(container, 'OUTBOUND');
    else if (this.subTab === 'calendar_cobro') this.renderCalendar(container, 'INBOUND');
    else if (this.subTab === 'calendar_pago') this.renderCalendar(container, 'OUTBOUND');
    else if (this.subTab === 'prestamos') this.renderPrestamos(container);
    else if (this.subTab === 'circulante') this.renderCirculante(container);
    else if (this.subTab === 'conciliacion') this.renderConciliacion(container);
    else if (this.subTab === 'movimientos') this.renderHistorialMovimientos(container);
    else if (this.subTab === 'riesgo') this.renderRiskDashboard(container);

      <div id="caja-historial-area" class="mt-3">
        <div class="text-center p-5 opacity-25 fw-black">CARGANDO HISTORIAL...</div>
      </div>
    `;
    TripleCajaModule.renderDashboard();
    this.renderCajaHistorial();
  },

  async renderCajaHistorial() {
    const res = await HandooApp.api('treasury.get_ledger', { cuenta: '570000001', start: '1970-01-01', end: '9999-12-31' });
    const area = document.getElementById('caja-historial-area');
    if(!area) return;
    if(res.ok) {
       const movements = res.data.movements.slice(0, 10);
       area.innerHTML = `
         <table class="table table-hover table-erp bg-white shadow-sm rounded-4">
            <thead><tr><th>FECHA</th><th>CONCEPTO</th><th class="text-end">IMPORTE</th></tr></thead>

               ${movements.map(m => `<tr><td>${new Date(m.fecha).toLocaleDateString()}</td><td>${m.concepto}</td><td class="text-end fw-black ${m.importe < 0 ? 'text-danger' : 'text-success'}">${m.importe.toLocaleString()} €</td></tr>`).join('')}

         </table>`;

       area.innerHTML = `<div class="p-5 text-center text-danger">Error cargando historial</div>`;
    }

  renderEfectos(container, direction) {
    const active = this.settings?.active_modules || [];
    const hasRemesas = active.includes(direction === 'INBOUND' ? 'FEAT_SEPA_COBRO' : 'FEAT_SEPA_PAGO');
    const hasBatch = active.includes(direction === 'INBOUND' ? 'FEAT_BATCH_COBRO' : 'FEAT_BATCH_PAGO');
    
    const filtered = this.effects.filter(e => {
      const matchDir = (e.direction || 'INBOUND') === direction;
      const matchStatus = this.filterStatus === 'ALL' || e.status === this.filterStatus;
      return matchDir && matchStatus;
    });

    container.innerHTML = `
      <div id="batch-bar-area"></div>

  setupTableDelegation(tbodyId, masterCheckId, rowCheckClass) {
    const tbody = document.getElementById(tbodyId);
    if (!tbody) return;

    tbody.addEventListener('click', (e) => {
       const tr = e.target.closest('tr');
       if (!tr || !tr.dataset.id) return;
       const id = tr.dataset.id;

       if (e.target.type === 'checkbox') {
          if (e.target.checked) window.selectedIds.add(id); else window.selectedIds.delete(id);
          tr.classList.toggle('row-selected', e.target.checked);
          HandooEvents.emit('selectionChanged');
          return;
       }
       HandooEvents.emit('openAudit', id);
    });

    const master = document.getElementById(masterCheckId);
    if (master) {
      master.onchange = (e) => {
        tbody.querySelectorAll(rowCheckClass).forEach(c => {
           const tr = c.closest('tr'); const id = tr.dataset.id;
           c.checked = e.target.checked;
           tr.classList.toggle('row-selected', e.target.checked);
           if (e.target.checked) window.selectedIds.add(id); else window.selectedIds.delete(id);
        });
        HandooEvents.emit('selectionChanged');
      };
    }
  },

               <input type="text" id="m-ent-search" class="form-control h-form-control mb-3 fw-bold text-uppercase" list="manual-entities-list" placeholder="TECLEE PARA BUSCAR..." oninput="TreasuryView.handleManualEntityChange(this.value, '${dir}')">
               <datalist id="manual-entities-list">
                  ${entities.map(e => `<option value="${e.nombre_fiscal} (${e.cif})">${e.nombre_fiscal}</option>`).join('')}
               </datalist>
               <input type="hidden" id="m-ent-id">
               
               <div id="m-sede-container" class="d-none">
                  <label class="h-label-refined">SEDE / CENTRO DE TRABAJO</label>
                  <select id="m-sede" class="form-select h-form-control mb-3 fw-bold"></select>
               </div>

               <label class="h-label-refined">IMPORTE (€)</label>
               <input type="number" id="m-imp" class="form-control h-form-control fw-black text-brand text-center fs-4 mb-3" value="0.00">
               <div class="row g-3">
                  <div class="col-6"><label class="h-label-refined">VENCIMIENTO</label><input type="date" id="m-vto" class="form-control h-form-control fw-bold" value="${new Date().toISOString().split('T')[0]}"></div>
                  <div class="col-6"><label class="h-label-refined">MÉTODO</label><select id="m-pay" class="form-select h-form-control fw-bold">${(this.settings?.masters?.payment_methods || []).map(pm => `<option value="${pm.nombre}">${pm.nombre}</option>`).join('')}</select></div>
               </div>
            </div>
         </div>
         <div class="h-modal-footer d-flex gap-2">
            <button id="btn-save-man" class="btn btn-dark fw-black flex-grow-1 shadow" onclick="TreasuryView.executeManualSave('${dir}')">GUARDAR ✅</button>
            <button class="btn btn-light border fw-bold flex-grow-1" onclick="this.closest('.h-modal-overlay').remove()">CANCELAR</button>
         </div>
      </div>`;
    document.body.appendChild(overlay);
  },

  handleManualEntityChange(val, dir) {
    const entities = dir === 'INBOUND' ? (this.settings?.masters?.clients || []) : (this.settings?.masters?.vendors || []);
    
    // Búsqueda flexible: por nombre exacto, por CIF exacto, o por el valor del datalist
    const match = entities.find(e => 
      `${e.nombre_fiscal} (${e.cif})` === val || 
      e.cif === val || 
      e.nombre_fiscal === val
    );
    
    const idInput = document.getElementById('m-ent-id');
    const searchInput = document.getElementById('m-ent-search');
    const sedeContainer = document.getElementById('m-sede-container');
    const sedeSelect = document.getElementById('m-sede');

    if (match) {
      idInput.value = match.id;
      // Si el usuario escribió el CIF o el nombre a mano, normalizamos al formato del datalist para feedback visual
      if (val !== `${match.nombre_fiscal} (${match.cif})`) {
        searchInput.value = `${match.nombre_fiscal} (${match.cif})`;
      }
      
      if (match.sedes && Array.isArray(match.sedes) && match.sedes.length > 0) {
        sedeContainer.classList.remove('d-none');
        sedeSelect.innerHTML = `<option value="">-- SELECCIONE SEDE (OPCIONAL) --</option>` + 
          match.sedes.map(s => `<option value="${s.id}">${s.nombre} - ${s.direccion}</option>`).join('');
      } else {
        sedeContainer.classList.add('d-none');
        sedeSelect.innerHTML = '';
      }
    } else {
      idInput.value = '';
      sedeContainer.classList.add('d-none');
    }
  },

  async executeManualSave(dir) {
    const entId = document.getElementById('m-ent-id').value;
    const entName = document.getElementById('m-ent-search').value;
    const sedeId = document.getElementById('m-sede').value;
    const p = { 
      client_id: entId, 
      client_name: entName, 
      sede_id: sedeId,
      importe: document.getElementById('m-imp').value, 
      vencimiento: document.getElementById('m-vto').value, 
      metodo: document.getElementById('m-pay').value, 
      direction: dir 
    };
    if(!p.client_id) return HandooApp.ui.showToast("Seleccione una entidad válida de la lista", "error");
    HandooApp.ui.setLoading('btn-save-man', true);
    const res = await HandooApp.api('treasury.create_manual_effect', p);
    if(res.ok) { document.querySelector('.h-modal-overlay').remove(); await this.load(); }
  },

  // --- LÍNEAS DE CRÉDITO (RESTAURADO V130) ---
  openCreditLineModal(id = null) {
    const isEdit = !!id;
    const raw = isEdit ? this.creditLines.find(x => String(x.id) === String(id)) : { entidad: '', limite: 0, dispuesto: 0 };
    const overlay = document.createElement('div'); overlay.className = 'h-modal-overlay animate-slide';
    overlay.innerHTML = `
      <div class="h-modal shadow-lg" style="width: 550px">
         <div class="h-modal-header bg-dark text-white"><h5 class="m-0 fw-black text-uppercase">${isEdit?'EDITAR':'NUEVA'} LÍNEA DE CRÉDITO</h5></div>
         <div class="h-modal-body bg-light">
            <div class="unified-block block-light mt-0">
               <label class="h-label-refined">ENTIDAD BANCARIA</label><input type="text" id="cl-ent" class="form-control mb-3" value="${raw.entidad}">
               <label class="h-label-refined">LÍMITE (€)</label><input type="number" id="cl-lim" class="form-control mb-3 fw-black text-success" value="${raw.limite || 0}">
               <label class="h-label-refined">DISPUESTO (€)</label><input type="number" id="cl-dis" class="form-control mb-3 fw-black text-danger" value="${raw.dispuesto || 0}">
               <label class="h-label-refined">REF. PÓLIZA / IBAN</label><input type="text" id="cl-pol" class="form-control mb-3 font-monospace" value="${raw.poliza || ''}">
            </div>
         </div>
         <div class="h-modal-footer d-flex gap-2">
            <button class="btn btn-dark fw-black flex-grow-1 shadow" id="btn-save-cl" onclick="TreasuryView.executeSaveCreditLine('${id||'new'}')">GUARDAR</button>
            <button class="btn btn-light border fw-bold flex-grow-1" onclick="this.closest('.h-modal-overlay').remove()">CANCELAR</button>
         </div>
      </div>`;
    document.body.appendChild(overlay);
  },

  async executeSaveCreditLine(id) {
    const p = { id: id==='new'?null:id, entidad: document.getElementById('cl-ent').value, limite: document.getElementById('cl-lim').value, dispuesto: document.getElementById('cl-dis').value, poliza: document.getElementById('cl-pol').value || 'GENERATED', pgc_root: '520' };
    HandooApp.ui.setLoading('btn-save-cl', true);
    const res = await HandooApp.api('treasury.save_credit_line', p);
    if(res.ok) { document.querySelector('.h-modal-overlay').remove(); await this.load(); }
  },

  openImportModal() {
    const overlay = document.createElement('div'); overlay.className = 'h-modal-overlay animate-slide';
    overlay.innerHTML = `<div class="h-modal shadow-lg" style="width: 450px"><div class="h-modal-header bg-dark text-white"><h5 class="m-0 fw-black">IMPORTAR EXTRACTO CSV</h5></div><div class="h-modal-body bg-light"><input type="file" id="bank-csv" class="form-control mb-2" accept=".csv"><p class="small text-muted">Formato: FECHA;CONCEPTO;IMPORTE</p></div><div class="h-modal-footer"><button class="btn btn-light border fw-bold flex-grow-1" onclick="this.closest('.h-modal-overlay').remove()">CANCELAR</button><button class="btn btn-dark fw-black flex-grow-1" id="btn-exec-import" onclick="TreasuryView.executeImport()">CARGAR</button></div></div>`;
    document.body.appendChild(overlay);
  },

  executeImport() {
    const file = document.getElementById('bank-csv').files[0]; if(!file) return;
    const reader = new FileReader();
    reader.onload = async (e) => {
       const lines = e.target.result.split('\n').slice(1);
       const rows = lines.map(l => { const p = l.split(';'); return { fecha: p[0], concepto: p[1], importe: p[2] }; }).filter(r => r.fecha && r.importe);
       await HandooApp.api('treasury.import_bank_csv', { bank_account_id: this.selectedBankAccountId, rows });
       document.querySelector('.h-modal-overlay').remove(); await this.load();
    };
    reader.readAsText(file);
  }
};
</script>
